# Usage: bun run test:integration:docker

services:
  postgres-test:
    extends:
      file: infra/docker/compose/postgres-test.yml
      service: postgres
    container_name: profile-postgres-test

  redis-test:
    extends:
      file: infra/docker/compose/redis-test.yml
      service: redis
    container_name: profile-redis-test

  db-setup-test:
    image: oven/bun:1.3.11
    container_name: profile-db-setup-test
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/profile_test
      REDIS_HOST: redis-test
      REDIS_PORT: 6379
      JWT_SECRET: test-secret-key-for-integration-tests-min-32-chars
      NODE_ENV: test
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    command: >
      sh -lc "
        bun install --frozen-lockfile &&
        bun run db:setup:test
      "
    restart: "no"
