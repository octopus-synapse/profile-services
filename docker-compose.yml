services:
  postgres:
    extends:
      file: infra/docker/compose/postgres.yml
      service: postgres
    container_name: profile-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - profile-network
    # P0-#29: refuse to publish Postgres on the host interface. The base
    # compose file inherits `ports: ["${POSTGRES_PORT:-5432}:5432"]`, which
    # combined with default `postgres:postgres` credentials exposes the DB
    # to anyone reachable on the host network. The backend talks to it
    # over the internal `profile-network` so port publishing is never
    # required in production.
    ports: !override []

  redis:
    extends:
      file: infra/docker/compose/redis.yml
      service: redis
    container_name: profile-redis
    volumes:
      - redis_data:/data
    networks:
      - profile-network
    # P0-#29: same as above — Redis was reachable on the host with the
    # default `redis` password.
    ports: !override []

  backend:
    image: ${DOCKER_IMAGE:-ghcr.io/octopus-synapse/profile-services:${IMAGE_TAG:-latest}}
    container_name: profile-backend
    restart: unless-stopped
    healthcheck:
      # Explicit healthcheck in compose so `docker compose ps` shows the
      # backend's state correctly even though the Dockerfile also declares
      # HEALTHCHECK. Useful for orchestrators that ignore image-level
      # healthchecks (Swarm, some Compose+watchtower setups).
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${BACKEND_PORT:-3001}/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # P0-#29 follow-up: swagger ships the entire API surface (including
      # internal endpoints) and is reconnaissance gold. Default OFF in
      # production; explicit `ENABLE_SWAGGER=true` to opt-in for ops.
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      PORT: ${BACKEND_PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-profile}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      # Email — transactional SENDING via Resend over SMTP (nodemailer).
      # Inbound mail (mail@/support@/noreply@patchcareers.org) is a separate
      # self-hosted docker-mailserver on the VPS; the app only sends.
      # SMTP_PASS carries the Resend API key (SMTP_USER is the literal "resend").
      SMTP_HOST: ${SMTP_HOST:-smtp.resend.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-resend}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@patchcareers.org}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Patch Careers}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      POSTHOG_HOST: ${POSTHOG_HOST:-http://posthog:8000}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY}
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - profile-network
    volumes:
      - backend_logs:/app/logs

networks:
  profile-network:
    external: true
    name: profile-network

volumes:
  postgres_data:
    name: profile-postgres-data
  redis_data:
    name: profile-redis-data
  backend_logs:
    name: profile-backend-logs
