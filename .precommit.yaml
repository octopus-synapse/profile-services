# Pre-commit check definitions consumed by `octopus-run-parallel`.
# Serial phase runs before parallel and can stage generated files into
# the current commit via `stage:`.

serial:
  - name: swagger
    # biome 2.x exits non-zero when ignored files are passed explicitly; pipe
    # the format step through `|| true` since swagger.json is in biome's
    # ignore list and we only call it for the unlikely case it gets unignored.
    cmd: "bun run scripts/generate-swagger-from-decorators.ts && (bunx biome format --write swagger.json client-swagger.json 2>/dev/null || true)"
    stage:
      - swagger.json
      - client-swagger.json
      - swagger-generation-report.json
      - src/graphql/schema.graphql
      - generated/schema.graphql

checks:
  - name: lockfile
    cmd: bun install --frozen-lockfile --dry-run
  - name: swagger-fresh
    # Paranoia: re-run the generator and verify the staged swagger
    # matches the source-of-truth route descriptors. The serial swagger
    # step already does this + `stage:` adds the result, but if `stage:`
    # ever fails to propagate the regen (rare but observed), this check
    # blocks the commit before it reaches CI.
    cmd: bun run scripts/generate-swagger-from-decorators.ts > /dev/null && git diff --exit-code swagger.json client-swagger.json
  - name: typecheck
    cmd: bun run typecheck
  - name: lint
    cmd: bun run lint:fast
  - name: route-coverage
    cmd: SDK_COVERAGE_MODE=error bun run src/scripts/validate-swagger-coverage.ts
  # `spectral` removed: the underlying `lint:spec` script was deleted in
  # the `chore(cleanup): F5.G` cleanup but this hook entry was missed.
  - name: unit
    cmd: bun test src
    runner: bun
  - name: arch
    cmd: bun test ./test/static-analysis/architecture
    runner: bun
  - name: contract
    cmd: bun test ./test/static-analysis/contracts
    runner: bun
  - name: no-prisma-push
    cmd: bun run scripts/lint-no-prisma-push.ts
  - name: no-passthrough
    cmd: bun run scripts/lint-no-passthrough.ts
  - name: no-prisma-transaction
    cmd: bun run scripts/lint-no-prisma-transaction.ts
  - name: no-post-200
    cmd: bun run scripts/lint-no-post-200.ts
  - name: no-success-envelope
    cmd: bun run scripts/lint-no-success-envelope.ts
  - name: no-bc-cache-ttl
    cmd: bun run scripts/lint-no-bc-cache-ttl.ts
  - name: pii-extended
    cmd: bun run scripts/lint-pii-extended.ts
  - name: ts-directives
    cmd: bun run scripts/lint-ts-directives.ts
  - name: no-prisma-mock-in-integration
    cmd: bun run scripts/lint-no-prisma-mock-in-integration.ts
  - name: no-db-helpers-in-unit
    cmd: bun run scripts/lint-no-db-helpers-in-unit.ts
  - name: skip-todo-deadline
    cmd: bun run scripts/lint-skip-todo-deadline.ts
  - name: e2e-cleanup
    cmd: bun run scripts/lint-e2e-cleanup.ts
  - name: cron-wrapper
    cmd: bun run scripts/lint-cron-wrapper.ts
  - name: ws-validate
    cmd: bun run scripts/lint-ws-validate.ts
  - name: no-mutable-module-state
    cmd: bun run scripts/lint-no-mutable-module-state.ts
  - name: no-process-env-in-domain
    cmd: bun run scripts/lint-no-process-env-in-domain.ts
  - name: deprecated-removeby
    cmd: bun run scripts/lint-deprecated-removeby.ts
  - name: no-unknown-cast
    cmd: bun run scripts/lint-no-unknown-cast.ts
  - name: pagination-adhoc
    cmd: bun run scripts/lint-pagination-adhoc.ts
  - name: file-size
    cmd: bun run scripts/lint-file-size.ts
  - name: no-cyclic-imports
    cmd: bun run scripts/lint-no-cyclic-imports.ts
  - name: boolean-trap
    cmd: bun run scripts/lint-boolean-trap.ts
  - name: jsdoc-params
    cmd: bun run scripts/lint-jsdoc-params.ts
