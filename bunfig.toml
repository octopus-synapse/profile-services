[test]
# Test configuration for Bun - NestJS Services
root = "./src"

# Preload test setup to suppress logs and cache common modules
preload = ["./test/setup.ts"]

# Skip slow timeout (bail on slow tests)
timeout = 5000

[install.scopes]
"@octopus-synapse" = { token = "$GITHUB_TOKEN", url = "https://npm.pkg.github.com" }
