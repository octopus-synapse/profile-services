[test]
# Integration configuration. Suites live under
# `test/infrastructure/integration/`, wired through the `TestApp`
# harness in `shared/`.
root = "./test/infrastructure/integration"
timeout = 60000

[install.scopes]
"@octopus-synapse" = { token = "$BUN_AUTH_TOKEN", url = "https://npm.pkg.github.com" }
