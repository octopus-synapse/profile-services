<svg xmlns="http://www.w3.org/2000/svg" width="820" height="560" viewBox="0 0 820 560" fill="none">
  <!-- CI Pipeline Card Template - Warm Theme -->
  <!-- Placeholders use {{NAME}} syntax for dynamic replacement -->

  <!-- Background -->
  <rect width="820" height="560" rx="12" fill="#1c1917"/>
  <rect width="820" height="560" rx="12" stroke="#292524" stroke-width="1" fill="none"/>

  <!-- Subtle top accent line -->
  <rect x="32" y="0" width="80" height="3" rx="1.5" fill="{{ACCENT_COLOR}}"/>

  <!-- Header -->
  <text x="32" y="38" fill="#fafaf9" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">CI PIPELINE</text>

  <!-- Commit info - centered -->
  <text x="410" y="28" fill="#e7e5e4" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" text-anchor="middle">{{COMMIT_MSG}}</text>
  <text x="410" y="46" fill="#78716c" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">{{COMMIT_HASH}} · {{COMMIT_AUTHOR}}</text>
  <text x="410" y="60" fill="#57534e" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">{{CO_AUTHORS}}</text>

  <!-- Branch - right aligned -->
  <text x="788" y="38" fill="#78716c" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="end">{{BRANCH}}</text>

  <!-- PRE-COMMIT Section Header -->
  <text x="32" y="95" fill="#fafaf9" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">PRE-COMMIT</text>
  <text x="390" y="95" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="end">{{PRECOMMIT_TOTAL_TIME}}</text>

  <!-- PRE-COMMIT Table -->
  <rect x="32" y="105" width="370" height="380" rx="8" fill="#292524"/>

  <!-- Table header -->
  <text x="50" y="133" fill="#d6d3d1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">CHECK</text>
  <text x="160" y="133" fill="#d6d3d1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">SUITES</text>
  <text x="220" y="133" fill="#d6d3d1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">TOTAL</text>
  <text x="280" y="133" fill="#d6d3d1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">PASS</text>
  <text x="330" y="133" fill="#d6d3d1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">FAIL</text>
  <text x="375" y="133" fill="#d6d3d1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">TIME</text>
  <line x1="50" y1="145" x2="390" y2="145" stroke="#44403c" stroke-width="1"/>

  <!-- Swagger -->
  <circle cx="60" cy="172" r="5" fill="{{SWAGGER_STATUS_COLOR}}"/>
  <text x="78" y="177" fill="#e7e5e4" font-family="Inter, system-ui, sans-serif" font-size="13">Swagger</text>
  <text x="175" y="177" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="235" y="177" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="290" y="177" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="340" y="177" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="385" y="177" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="end">{{SWAGGER_TIME}}</text>

  <!-- TypeCheck -->
  <circle cx="60" cy="212" r="5" fill="{{TYPECHECK_STATUS_COLOR}}"/>
  <text x="78" y="217" fill="#e7e5e4" font-family="Inter, system-ui, sans-serif" font-size="13">TypeCheck</text>
  <text x="175" y="217" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="235" y="217" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="290" y="217" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="340" y="217" fill="{{TYPECHECK_FAIL_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{TYPECHECK_ERRORS}}</text>
  <text x="385" y="217" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="end">{{TYPECHECK_TIME}}</text>

  <!-- Lint -->
  <circle cx="60" cy="252" r="5" fill="{{LINT_STATUS_COLOR}}"/>
  <text x="78" y="257" fill="#e7e5e4" font-family="Inter, system-ui, sans-serif" font-size="13">Lint</text>
  <text x="175" y="257" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{LINT_FILES}}</text>
  <text x="235" y="257" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="290" y="257" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="340" y="257" fill="{{LINT_FAIL_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{LINT_ERRORS}}</text>
  <text x="385" y="257" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="end">{{LINT_TIME}}</text>

  <!-- Unit -->
  <circle cx="60" cy="292" r="5" fill="{{UNIT_STATUS_COLOR}}"/>
  <text x="78" y="297" fill="#e7e5e4" font-family="Inter, system-ui, sans-serif" font-size="13">Unit</text>
  <text x="175" y="297" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{UNIT_SUITES}}</text>
  <text x="235" y="297" fill="#fafaf9" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">{{UNIT_TOTAL}}</text>
  <text x="290" y="297" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{UNIT_PASS}}</text>
  <text x="340" y="297" fill="{{UNIT_FAIL_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{UNIT_FAIL}}</text>
  <text x="385" y="297" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="end">{{UNIT_TIME}}</text>

  <!-- Arch -->
  <circle cx="60" cy="332" r="5" fill="{{ARCH_STATUS_COLOR}}"/>
  <text x="78" y="337" fill="#e7e5e4" font-family="Inter, system-ui, sans-serif" font-size="13">Arch</text>
  <text x="175" y="337" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{ARCH_SUITES}}</text>
  <text x="235" y="337" fill="#fafaf9" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">{{ARCH_TOTAL}}</text>
  <text x="290" y="337" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{ARCH_PASS}}</text>
  <text x="340" y="337" fill="{{ARCH_FAIL_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{ARCH_FAIL}}</text>
  <text x="385" y="337" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="end">{{ARCH_TIME}}</text>

  <!-- Contracts -->
  <circle cx="60" cy="372" r="5" fill="{{CONTRACTS_STATUS_COLOR}}"/>
  <text x="78" y="377" fill="#e7e5e4" font-family="Inter, system-ui, sans-serif" font-size="13">Contracts</text>
  <text x="175" y="377" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{CONTRACTS_SUITES}}</text>
  <text x="235" y="377" fill="#fafaf9" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">{{CONTRACTS_TOTAL}}</text>
  <text x="290" y="377" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{CONTRACTS_PASS}}</text>
  <text x="340" y="377" fill="{{CONTRACTS_FAIL_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{CONTRACTS_FAIL}}</text>
  <text x="385" y="377" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="end">{{CONTRACTS_TIME}}</text>

  <!-- PRE-COMMIT Total -->
  <line x1="50" y1="400" x2="390" y2="400" stroke="#44403c" stroke-width="1"/>
  <text x="50" y="428" fill="#d6d3d1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">TOTAL</text>
  <text x="175" y="428" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{PRECOMMIT_TOTAL_SUITES}}</text>
  <text x="235" y="428" fill="#fafaf9" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">{{PRECOMMIT_TOTAL_TESTS}}</text>
  <text x="290" y="428" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{PRECOMMIT_TOTAL_PASS}}</text>
  <text x="340" y="428" fill="{{PRECOMMIT_TOTAL_FAIL_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{PRECOMMIT_TOTAL_FAIL}}</text>
  <text x="385" y="428" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="end">{{PRECOMMIT_TOTAL_TIME}}</text>

  <!-- Attestation -->
  <rect x="50" y="448" width="340" height="28" rx="4" fill="#1c1917"/>
  <text x="62" y="466" fill="#57534e" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500">ATTESTATION</text>
  <text x="140" y="466" fill="#78716c" font-family="JetBrains Mono, monospace" font-size="9">{{ATTESTATION_HASH}}</text>

  <!-- CI Section Header -->
  <text x="420" y="95" fill="#fafaf9" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">CI</text>
  <text x="778" y="95" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="end">{{CI_TOTAL_TIME}}</text>

  <!-- CI Table - increased height for TOTAL row padding -->
  <rect x="420" y="105" width="370" height="235" rx="8" fill="#292524"/>

  <!-- CI Table header -->
  <text x="438" y="133" fill="#d6d3d1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">JOB</text>
  <text x="555" y="133" fill="#d6d3d1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">SUITES</text>
  <text x="615" y="133" fill="#d6d3d1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">TOTAL</text>
  <text x="670" y="133" fill="#d6d3d1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">PASS</text>
  <text x="720" y="133" fill="#d6d3d1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">FAIL</text>
  <text x="773" y="133" fill="#d6d3d1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="end">TIME</text>
  <line x1="438" y1="145" x2="778" y2="145" stroke="#44403c" stroke-width="1"/>

  <!-- Build -->
  <circle cx="448" cy="170" r="5" fill="{{BUILD_STATUS_COLOR}}"/>
  <text x="466" y="175" fill="{{BUILD_TEXT_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13">Build</text>
  <text x="555" y="175" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="615" y="175" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="670" y="175" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="720" y="175" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="773" y="175" fill="{{BUILD_TIME_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="end">{{BUILD_TIME}}</text>

  <!-- Integration -->
  <circle cx="448" cy="205" r="5" fill="{{INTEGRATION_STATUS_COLOR}}"/>
  <text x="466" y="210" fill="{{INTEGRATION_TEXT_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13">Integration</text>
  <text x="555" y="210" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{INTEGRATION_SUITES}}</text>
  <text x="615" y="210" fill="#fafaf9" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">{{INTEGRATION_TOTAL}}</text>
  <text x="670" y="210" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{INTEGRATION_PASS}}</text>
  <text x="720" y="210" fill="{{INTEGRATION_FAIL_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" {{INTEGRATION_FAIL_WEIGHT}} text-anchor="middle">{{INTEGRATION_FAIL}}</text>
  <text x="773" y="210" fill="{{INTEGRATION_TIME_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="end">{{INTEGRATION_TIME}}</text>

  <!-- E2E -->
  <circle cx="448" cy="240" r="5" fill="{{E2E_STATUS_COLOR}}"/>
  <text x="466" y="245" fill="{{E2E_TEXT_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13">E2E</text>
  <text x="555" y="245" fill="{{E2E_SUITES_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{E2E_SUITES}}</text>
  <text x="615" y="245" fill="{{E2E_TOTAL_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" {{E2E_TOTAL_WEIGHT}} text-anchor="middle">{{E2E_TOTAL}}</text>
  <text x="670" y="245" fill="{{E2E_PASS_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{E2E_PASS}}</text>
  <text x="720" y="245" fill="{{E2E_FAIL_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" {{E2E_FAIL_WEIGHT}} text-anchor="middle">{{E2E_FAIL}}</text>
  <text x="773" y="245" fill="{{E2E_TIME_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="end">{{E2E_TIME}}</text>

  <!-- Security -->
  <circle cx="448" cy="275" r="5" fill="{{SECURITY_STATUS_COLOR}}"/>
  <text x="466" y="280" fill="{{SECURITY_TEXT_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13">Security</text>
  <text x="555" y="280" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="615" y="280" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="670" y="280" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="720" y="280" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">—</text>
  <text x="773" y="280" fill="{{SECURITY_TIME_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="end">{{SECURITY_TIME}}</text>

  <!-- CI Total - with proper padding -->
  <line x1="438" y1="305" x2="778" y2="305" stroke="#44403c" stroke-width="1"/>
  <text x="438" y="330" fill="#d6d3d1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">TOTAL</text>
  <text x="555" y="330" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{CI_TOTAL_SUITES}}</text>
  <text x="615" y="330" fill="#fafaf9" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">{{CI_TOTAL_TESTS}}</text>
  <text x="670" y="330" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">{{CI_TOTAL_PASS}}</text>
  <text x="720" y="330" fill="{{CI_TOTAL_FAIL_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="13" {{CI_TOTAL_FAIL_WEIGHT}} text-anchor="middle">{{CI_TOTAL_FAIL}}</text>
  <text x="773" y="330" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="end">{{CI_TOTAL_TIME}}</text>

  <!-- STATS SECTION - moved down to accommodate larger CI table -->
  <!-- Row 1: 4 equal cards -->
  <rect x="420" y="355" width="88" height="55" rx="6" fill="#292524"/>
  <text x="432" y="375" fill="#78716c" font-family="Inter, system-ui, sans-serif" font-size="9">PASS RATE</text>
  <text x="432" y="398" fill="{{PASS_RATE_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700">{{PASS_RATE}}</text>

  <rect x="516" y="355" width="88" height="55" rx="6" fill="#292524"/>
  <text x="528" y="375" fill="#78716c" font-family="Inter, system-ui, sans-serif" font-size="9">TOTAL TESTS</text>
  <text x="528" y="398" fill="#fafaf9" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700">{{TOTAL_TESTS}}</text>

  <rect x="612" y="355" width="88" height="55" rx="6" fill="#292524"/>
  <text x="624" y="375" fill="#78716c" font-family="Inter, system-ui, sans-serif" font-size="9">DURATION</text>
  <text x="624" y="398" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700">{{TOTAL_DURATION}}</text>

  <rect x="708" y="355" width="82" height="55" rx="6" fill="#292524"/>
  <text x="720" y="375" fill="#78716c" font-family="Inter, system-ui, sans-serif" font-size="9">STATUS</text>
  <circle cx="730" cy="393" r="4" fill="{{OVERALL_STATUS_COLOR}}"/>
  <text x="742" y="398" fill="{{OVERALL_STATUS_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">{{OVERALL_STATUS_TEXT}}</text>

  <!-- Row 2: 4 equal mini cards -->
  <rect x="420" y="420" width="88" height="45" rx="6" fill="#292524"/>
  <text x="432" y="438" fill="#78716c" font-family="Inter, system-ui, sans-serif" font-size="9">PASSED</text>
  <text x="432" y="456" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600">{{TOTAL_PASSED}}</text>

  <rect x="516" y="420" width="88" height="45" rx="6" fill="#292524"/>
  <text x="528" y="438" fill="#78716c" font-family="Inter, system-ui, sans-serif" font-size="9">FAILED</text>
  <text x="528" y="456" fill="{{TOTAL_FAILED_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600">{{TOTAL_FAILED}}</text>

  <rect x="612" y="420" width="88" height="45" rx="6" fill="#292524"/>
  <text x="624" y="438" fill="#78716c" font-family="Inter, system-ui, sans-serif" font-size="9">SKIPPED</text>
  <text x="624" y="456" fill="{{TOTAL_SKIPPED_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600">{{TOTAL_SKIPPED}}</text>

  <rect x="708" y="420" width="82" height="45" rx="6" fill="#292524"/>
  <text x="720" y="438" fill="#78716c" font-family="Inter, system-ui, sans-serif" font-size="9">ERRORS</text>
  <text x="720" y="456" fill="{{TOTAL_ERRORS_COLOR}}" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600">{{TOTAL_ERRORS}}</text>

  <!-- Row 3: Time breakdown -->
  <rect x="420" y="475" width="185" height="40" rx="6" fill="#292524"/>
  <text x="432" y="491" fill="#78716c" font-family="Inter, system-ui, sans-serif" font-size="9">PRE-COMMIT</text>
  <text x="432" y="507" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">{{PRECOMMIT_TOTAL_TIME}}</text>
  <text x="520" y="491" fill="#78716c" font-family="Inter, system-ui, sans-serif" font-size="9">CI</text>
  <text x="520" y="507" fill="#a8a29e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">{{CI_TOTAL_TIME}}</text>

  <rect x="613" y="475" width="177" height="40" rx="6" fill="#292524"/>
  <text x="625" y="491" fill="#78716c" font-family="Inter, system-ui, sans-serif" font-size="9">TOTAL DURATION</text>
  <text x="625" y="507" fill="#fafaf9" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">{{TOTAL_DURATION}}</text>

  <!-- Footer -->
  <text x="32" y="545" fill="#44403c" font-family="Inter, system-ui, sans-serif" font-size="10">{{TIMESTAMP}} · workflow run #{{RUN_NUMBER}}</text>
</svg>
