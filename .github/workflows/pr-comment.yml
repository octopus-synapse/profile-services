name: PR Comment

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=$(gh pr list --repo "${{ github.repository }}" \
                          --head "${{ github.event.workflow_run.head_branch }}" \
                          --state open \
                          --json number --jq '.[0].number')
          echo "number=$PR" >> $GITHUB_OUTPUT

      - name: Collect job results
        id: checks
        if: steps.pr.outputs.number
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          CHECKS=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" --paginate \
            | jq -c '[.jobs[] | {
                name,
                status: (if .conclusion == "success" then "ok" else "fail" end),
                duration_s: (if .completed_at and .started_at
                              then (((.completed_at | fromdateiso8601) - (.started_at | fromdateiso8601)) | tostring)
                              else "0" end)
              }]')
          echo "json=$CHECKS" >> $GITHUB_OUTPUT

      - uses: octopus-synapse/octopus-workflows/.github/actions/post-ci-comment@v1
        if: steps.pr.outputs.number
        with:
          github-token: ${{ github.token }}
          pr-number: ${{ steps.pr.outputs.number }}
          checks-json: ${{ steps.checks.outputs.json }}
