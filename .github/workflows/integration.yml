# =============================================================================
# Integration Tests Workflow
# =============================================================================
#
# Philosophy (Uncle Bob + Kent Beck):
#   - "Test the real thing when it matters"
#   - Integration tests verify components work together
#   - Requires real database and cache (Docker services)
#
# Triggers:
#   - Pull requests to main/dev (when relevant files change)
#   - Manual dispatch for debugging
#
# =============================================================================

name: Integration Tests

on:
    pull_request:
        branches: [main, dev]
        paths:
            - "src/**"
            - "test/integration/**"
            - "prisma/**"
            - "package.json"
            - "bunfig.integration.toml"
    workflow_dispatch:
        inputs:
            debug:
                description: "Enable debug logging"
                required: false
                default: "false"

permissions:
    contents: read
    pull-requests: write

env:
    DATABASE_URL: postgresql://postgres:postgres@localhost:5432/integration_test_db
    REDIS_HOST: localhost
    REDIS_PORT: 6379
    JWT_SECRET: integration-test-secret-key-minimum-32-characters
    NODE_ENV: test

jobs:
    integration:
        name: Run Integration Tests
        runs-on: ubuntu-latest
        timeout-minutes: 15

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: integration_test_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.2.23

            - name: Cache Dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      node_modules
                      ~/.bun/install/cache
                  key: deps-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
                  restore-keys: deps-${{ runner.os }}-

            - name: Configure npm registry
              run: |
                  echo "@octopus-synapse:registry=https://npm.pkg.github.com" >> .npmrc
                  echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

            - name: Install Dependencies
              run: bun install --frozen-lockfile

            - name: Generate Prisma Client
              run: bunx prisma generate

            - name: Setup Database
              run: bun run db:setup:test

            - name: Run Integration Tests
              id: tests
              run: |
                  echo "## 🧪 Integration Test Results" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  if bun test --config=bunfig.integration.toml 2>&1 | tee test-output.txt; then
                    echo "✅ All integration tests passed" >> $GITHUB_STEP_SUMMARY
                    echo "status=success" >> $GITHUB_OUTPUT
                  else
                    echo "❌ Integration tests failed" >> $GITHUB_STEP_SUMMARY
                    echo "status=failure" >> $GITHUB_OUTPUT
                    exit 1
                  fi

            - name: Upload Test Results
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: integration-test-results
                  path: |
                      test-output.txt
                      test-results/
                  retention-days: 7

            - name: Comment PR on Failure
              if: failure() && github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      let output = '';
                      try {
                        output = fs.readFileSync('test-output.txt', 'utf8');
                      } catch (e) {
                        output = 'Could not read test output';
                      }

                      const body = [
                        '## ❌ Integration Tests Failed',
                        '',
                        '<details>',
                        '<summary>Test Output</summary>',
                        '',
                        '```',
                        output.slice(-3000), // Last 3000 chars
                        '```',
                        '</details>',
                        '',
                        '> Re-run with `workflow_dispatch` and `debug: true` for more details'
                      ].join('\n');

                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body
                      });
