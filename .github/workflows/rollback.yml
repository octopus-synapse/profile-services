name: Rollback

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (e.g., main-abc1234)"
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate image tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [[ ! "$TAG" =~ ^[a-z0-9][a-z0-9._-]{0,127}$ ]]; then
            echo "Error: Invalid image tag format: $TAG"
            echo "Must start with lowercase letter/number, max 128 chars"
            exit 1
          fi

  rollback:
    needs: validate
    # Rollback reuses _deploy.yml with an explicit prior image tag. No ENV_VARS
    # (keep the existing .env on the box) and has-database=false (rolling the
    # image back must never run a forward migration).
    uses: octopus-synapse/octopus-workflows/.github/workflows/_deploy.yml@v1
    with:
      service-name: "backend"
      container-name: "profile-backend"
      deploy-path: "/opt/profile-services"
      image-tag: ${{ inputs.image_tag }}
      has-database: false
    secrets:
      NODE_AUTH_TOKEN: ${{ secrets.GH_PAT }}
      OCTOPUS_SSH_PRIVATE_KEY: ${{ secrets.OCTOPUS_SSH_PRIVATE_KEY }}
      OCTOPUS_VM_HOST: ${{ secrets.OCTOPUS_VM_HOST }}
      OCTOPUS_VM_USER: ${{ secrets.OCTOPUS_VM_USER }}
