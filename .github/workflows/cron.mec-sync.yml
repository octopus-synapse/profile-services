name: MEC Data Sync

on:
  schedule:
    # Run on January 1st at 03:00 UTC
    - cron: "0 3 1 1 *"
    # Run on July 1st at 03:00 UTC
    - cron: "0 3 1 7 *"
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  download-and-sync:
    name: Download MEC CSV & Sync
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Need full history because the commit step does `git pull --rebase`.
          fetch-depth: 0

      # Reads version from .bun-version file
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Configure GitHub Packages auth
        run: |
          {
            echo "@octopus-synapse:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}"
          } > .npmrc

      - name: Restore Dependencies Cache
        id: cache-deps
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          # P0-#27: `hashFiles('bun.lockb')` matched no files (Bun 1.3+ uses
          # `bun.lock`), so the cache key was constant and node_modules
          # never refreshed when deps changed.
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: deps-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install Puppeteer Chrome
        run: bunx puppeteer browsers install chrome

      - name: Download MEC CSV (with retry)
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 60
          command: |
            xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
              bun run scripts/mec-download.ts
        env:
          DISPLAY: ":99"

      - name: Verify CSV file
        run: |
          if [ -f data/mec-courses.csv ]; then
            FILE_SIZE=$(stat -c%s "data/mec-courses.csv")
            echo "✅ CSV downloaded: $(numfmt --to=iec-i --suffix=B $FILE_SIZE)"

            if [ "$FILE_SIZE" -lt 100000000 ]; then
              echo "❌ File too small (expected ~225MB)"
              exit 1
            fi

            echo "First 3 lines:"
            head -3 data/mec-courses.csv
          else
            echo "❌ CSV file not found"
            exit 1
          fi

      - name: Commit and push CSV (with retry)
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"

            # Pull latest changes to avoid conflicts
            git pull --rebase origin main || true

            if git diff --quiet data/mec-courses.csv 2>/dev/null; then
              echo "📌 No changes to commit"
            else
              git add data/mec-courses.csv
              git commit -m "chore(mec): update courses data [skip ci]"
              git push
              echo "✅ Committed new MEC data"
            fi

      - name: Trigger database sync
        if: ${{ vars.MEC_SYNC_API_ENABLED == 'true' }}
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            curl -sf -X POST \
              -H "Content-Type: application/json" \
              -H "x-internal-token: ${{ secrets.INTERNAL_API_TOKEN }}" \
              "${{ secrets.BACKEND_URL }}/api/mec/internal/sync" | jq '.'
