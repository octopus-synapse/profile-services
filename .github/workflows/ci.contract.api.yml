name: CI - API Contract

on:
  pull_request:
    branches: [main, homolog, dev]
    paths:
      - "src/**/*.routes.ts"
      - "src/shared-kernel/http/**"
      - "src/shared-kernel/schemas/common/**"
      - "scripts/generate-swagger-from-decorators.ts"
      - "client-swagger.json"
      - "swagger.json"
      - ".spectral.yaml"
      - ".github/workflows/ci.contract.api.yml"
  workflow_dispatch:

concurrency:
  group: ci-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  spectral:
    name: Spectral lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Regenerate swagger (catches Zod→OpenAPI drift)
        run: bun run scripts/generate-swagger-from-decorators.ts
      - name: Verify spec is up-to-date with code
        run: |
          if ! git diff --exit-code swagger.json client-swagger.json; then
            echo "::error::swagger.json/client-swagger.json out of date. Run 'bun run swagger:generate' locally and commit the result."
            exit 1
          fi
      - name: Spectral lint
        run: bun run lint:spec

  optic:
    name: Optic — breaking change detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base branch spec
        id: base
        run: |
          BASE=${{ github.base_ref || 'main' }}
          git fetch --no-tags --depth=1 origin $BASE
          mkdir -p .optic
          git show origin/$BASE:client-swagger.json > .optic/base.json 2>/dev/null || echo '{"openapi":"3.0.0","info":{"title":"empty","version":"0.0.0"},"paths":{}}' > .optic/base.json
          cp client-swagger.json .optic/head.json
      - name: Run Optic diff
        uses: opticdev/action@v1
        with:
          base_file: .optic/base.json
          head_file: .optic/head.json
          # Fail the job on any "breaking" change. Comment-only on
          # additive changes. Override per-PR by adding `[breaking-ok]`
          # to the PR title.
          fail_on_breaking_change: ${{ !contains(github.event.pull_request.title, '[breaking-ok]') }}
        continue-on-error: false

  dredd:
    name: Dredd — contract conformance
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: profile_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/profile_test
      REDIS_HOST: localhost
      REDIS_PORT: 6380
      JWT_SECRET: dredd_test_secret_key_minimum_32_characters_long
      NODE_ENV: test
      PORT: 3010
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup database
        run: bun run db:setup:test
      - name: Boot app in background
        run: |
          bun --bun src/main.ts &
          echo $! > app.pid
          # Wait for /api/health to respond.
          for i in {1..40}; do
            if curl -sf http://localhost:3010/api/health > /dev/null; then
              echo "App is up."
              exit 0
            fi
            sleep 1
          done
          echo "::error::App failed to boot within 40s."
          exit 1
      - name: Install Dredd
        run: npm install -g dredd@14
      - name: Run Dredd
        run: |
          dredd swagger.json http://localhost:3010 \
            --hookfiles=./test/infrastructure/contract/dredd-hooks.js \
            --reporter=apiary \
            --reporter=cli \
            --output=./test/infrastructure/contract/dredd-report.html
      - name: Upload Dredd report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dredd-report
          path: test/infrastructure/contract/dredd-report.html
      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then kill "$(cat app.pid)" || true; fi
