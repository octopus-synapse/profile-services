name: CI

on:
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - "CHANGELOG.md"
      - ".release-please-manifest.json"
      - "*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Gate: Skip duplicates
  # ═══════════════════════════════════════════════════════════════════════════
  should-skip:
    name: Should Skip
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip.outputs.should_skip }}
    steps:
      - id: skip
        uses: fkirc/skip-duplicate-actions@v5
        with:
          concurrent_skipping: "same_content_newer"
          skip_after_successful_duplicate: "true"
          paths_ignore: '["CHANGELOG.md", ".release-please-manifest.json", "*.md", "docs/**"]'

  # ═══════════════════════════════════════════════════════════════════════════
  # Gate: Detect changes
  # ═══════════════════════════════════════════════════════════════════════════
  detect-changes:
    name: Detect Changes
    needs: [should-skip]
    if: needs.should-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      prisma: ${{ steps.filter.outputs.prisma }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'package.json'
              - 'bun.lockb'
              - 'tsconfig*.json'
            tests:
              - 'test/**'
            prisma:
              - 'prisma/**'

  # ═══════════════════════════════════════════════════════════════════════════
  # Gate: Verify pre-commit attestation
  # ═══════════════════════════════════════════════════════════════════════════
  verify-attestation:
    name: Verify Pre-Commit
    needs: [should-skip, init-comment]
    if: always() && needs.should-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify Attestation
        id: verify
        run: |
          START=$(date +%s)
          chmod +x ./scripts/attestation.sh
          ./scripts/attestation.sh verify
          echo "duration=$(($(date +%s) - START))s" >> $GITHUB_OUTPUT

      - name: Update PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x scripts/ci-comment.sh
          STATUS="${{ steps.verify.outcome }}"
          DURATION="${{ steps.verify.outputs.duration }}"
          if [[ "$STATUS" == "success" ]]; then
            DESC="Verified"
          else
            DESC="Pre-commit checks missing"
          fi
          ./scripts/ci-comment.sh update "Attestation" "$STATUS" "$DESC" "${DURATION:-—}"

  # ═══════════════════════════════════════════════════════════════════════════
  # Init: Create PR comment with all checks pending
  # ═══════════════════════════════════════════════════════════════════════════
  init-comment:
    name: Init Comment
    needs: [should-skip, detect-changes]
    if: |
      needs.should-skip.outputs.should_skip != 'true' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create CI status comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          chmod +x scripts/ci-comment.sh
          ./scripts/ci-comment.sh init

  # ═══════════════════════════════════════════════════════════════════════════
  # Build: Docker smoke test (sem push — validação do Dockerfile apenas)
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build
    needs: [should-skip, detect-changes, init-comment]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.prisma == 'true')
    uses: ./.github/workflows/ci.build.yml
    with:
      image_tag: pr-${{ github.event.pull_request.number || github.run_number }}-${{ github.sha }}
      pr-number: ${{ github.event.pull_request.number }}
    secrets: inherit

  # ═══════════════════════════════════════════════════════════════════════════
  # NOTE: Unit tests are NOT run in CI.
  # They already run in pre-commit (verified by attestation).
  # Running them again here would be pure duplication.
  # ═══════════════════════════════════════════════════════════════════════════

  # ═══════════════════════════════════════════════════════════════════════════
  # Test: Integration
  # ═══════════════════════════════════════════════════════════════════════════
  integration:
    name: Integration
    needs: [should-skip, detect-changes, verify-attestation, init-comment]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.verify-attestation.result == 'success' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.prisma == 'true')
    uses: ./.github/workflows/ci.infrastructure.integration.yml
    with:
      pr-number: ${{ github.event.pull_request.number }}
    secrets: inherit

  # ═══════════════════════════════════════════════════════════════════════════
  # Test: E2E
  # ═══════════════════════════════════════════════════════════════════════════
  e2e:
    name: E2E
    needs: [should-skip, detect-changes, verify-attestation, init-comment]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.verify-attestation.result == 'success' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.prisma == 'true')
    uses: ./.github/workflows/ci.infrastructure.e2e.yml
    with:
      pr-number: ${{ github.event.pull_request.number }}
    secrets: inherit

  # ═══════════════════════════════════════════════════════════════════════════
  # Test: Security
  # ═══════════════════════════════════════════════════════════════════════════
  security:
    name: Security
    needs: [should-skip, detect-changes, verify-attestation, init-comment]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.verify-attestation.result == 'success' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.tests == 'true')
    uses: ./.github/workflows/ci.static-analysis.security.yml
    with:
      pr-number: ${{ github.event.pull_request.number }}
    secrets: inherit

  # ═══════════════════════════════════════════════════════════════════════════
  # Summary
  # ═══════════════════════════════════════════════════════════════════════════
  status:
    name: CI Status
    needs: [verify-attestation, build, integration, e2e, security]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Results
        id: check
        run: |
          echo "## 📊 CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Attestation | ${{ needs.verify-attestation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ${{ needs.integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.verify-attestation.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]] || \
             [[ "${{ needs.integration.result }}" == "failure" ]] || \
             [[ "${{ needs.e2e.result }}" == "failure" ]] || \
             [[ "${{ needs.security.result }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **CI failed**" >> $GITHUB_STEP_SUMMARY
            echo "success=false" >> $GITHUB_OUTPUT
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **CI passed**" >> $GITHUB_STEP_SUMMARY
            echo "success=true" >> $GITHUB_OUTPUT
          fi

      - name: Finalize PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x scripts/ci-comment.sh
          ./scripts/ci-comment.sh finalize "${{ steps.check.outputs.success }}"

      - name: Fail if checks failed
        if: steps.check.outputs.success != 'true'
        run: exit 1
