name: CI

on:
  pull_request:
    branches: [main, homolog, dev]
    paths-ignore:
      - "CHANGELOG.md"
      - ".release-please-manifest.json"
      - "*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  should-skip:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip.outputs.should_skip }}
    steps:
      - id: skip
        uses: fkirc/skip-duplicate-actions@v5
        with:
          concurrent_skipping: "same_content_newer"
          skip_after_successful_duplicate: "true"
          paths_ignore: '["CHANGELOG.md", ".release-please-manifest.json", "*.md", "docs/**"]'

  detect-changes:
    needs: should-skip
    if: needs.should-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      prisma: ${{ steps.filter.outputs.prisma }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'package.json'
              - 'bun.lockb'
              - 'tsconfig*.json'
            tests:
              - 'test/**'
            prisma:
              - 'prisma/**'

  verify-attestation:
    needs: should-skip
    if: needs.should-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: octopus-synapse/octopus-workflows/.github/actions/verify-attestation@v1

  build:
    needs: [should-skip, detect-changes]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.prisma == 'true')
    uses: ./.github/workflows/ci.build.yml
    with:
      image_tag: pr-${{ github.event.pull_request.number || github.run_number }}-${{ github.sha }}
    secrets: inherit

  integration:
    needs: [should-skip, detect-changes, verify-attestation]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.verify-attestation.result == 'success' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.prisma == 'true')
    uses: ./.github/workflows/ci.infrastructure.integration.yml
    secrets: inherit

  e2e:
    needs: [should-skip, detect-changes, verify-attestation]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.verify-attestation.result == 'success' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.prisma == 'true')
    uses: ./.github/workflows/ci.infrastructure.e2e.yml
    secrets: inherit

  security:
    needs: [should-skip, detect-changes, verify-attestation]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.verify-attestation.result == 'success' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.tests == 'true')
    uses: ./.github/workflows/ci.static-analysis.security.yml
    secrets: inherit

  status:
    needs: [verify-attestation, build, integration, e2e, security]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: octopus-synapse/octopus-workflows/.github/actions/evaluate-ci-results@v1
        with:
          attestation: ${{ needs.verify-attestation.result }}
          build: ${{ needs.build.result }}
          integration: ${{ needs.integration.result }}
          e2e: ${{ needs.e2e.result }}
          security: ${{ needs.security.result }}
