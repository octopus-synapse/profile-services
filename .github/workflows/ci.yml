name: CI

on:
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - "CHANGELOG.md"
      - "package.json"
      - ".release-please-manifest.json"
      - "*.md"
      - "docs/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  # Skip CI for release-please PRs (only version bumps, no code changes)
  should-skip:
    name: Should Skip
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          concurrent_skipping: "same_content_newer"
          skip_after_successful_duplicate: "true"
          paths_ignore: '["CHANGELOG.md", "package.json", ".release-please-manifest.json", "*.md", "docs/**"]'
          do_not_skip: '["workflow_dispatch", "schedule"]'

  # Detect which parts of codebase changed
  detect-changes:
    name: Detect Changes
    needs: should-skip
    if: needs.should-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      e2e: ${{ steps.filter.outputs.e2e }}
      prisma: ${{ steps.filter.outputs.prisma }}
      config: ${{ steps.filter.outputs.config }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
            tests:
              - 'test/**'
            e2e:
              - 'test/e2e/**'
            prisma:
              - 'prisma/**'
            config:
              - 'package.json'
              - 'tsconfig*.json'
              - 'bunfig*.toml'

  # ==========================================================================
  # Verify Pre-Commit Attestation (O(1) - no re-execution of checks)
  # ==========================================================================
  verify-attestation:
    name: Verify Pre-Commit Attestation
    needs: [should-skip]
    if: needs.should-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Must checkout the actual PR head commit, not the merge commit (refs/pull/N/merge).
          # The merge commit has a different tree hash, which breaks attestation verification.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify Pre-Commit Ran (O(1) check)
        run: |
          chmod +x ./scripts/verify-pre-commit-attestation.sh
          ./scripts/verify-pre-commit-attestation.sh

  # Centralized dependency installation - runs once, cached for all jobs
  setup:
    name: Setup Dependencies
    needs: [should-skip, detect-changes]
    if: |
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.detect-changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads version from .bun-version file
      - uses: oven-sh/setup-bun@v2

      - name: Cache Dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Cache Prisma Client
        id: cache-prisma
        uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ hashFiles('prisma/schema/**/*.prisma') }}
          restore-keys: |
            prisma-

      - name: Generate Prisma Client
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: bunx prisma generate

  # ==========================================================================
  # NOTE: Integration and E2E tests are in separate workflow files
  # - integration.yml → runs on PR with infrastructure (Postgres, Redis)
  # - e2e.yml → runs on PR to main + nightly schedule
  # ==========================================================================

  build:
    name: Build
    needs: [setup, detect-changes, should-skip, verify-attestation]
    if: |
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.detect-changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Restore Dependencies
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          fail-on-cache-miss: true

      - name: Restore Prisma Client
        uses: actions/cache/restore@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ hashFiles('prisma/schema/**/*.prisma') }}
          fail-on-cache-miss: true

      - name: Cache Build Artifacts
        uses: actions/cache@v4
        id: build-cache
        with:
          path: dist
          key: build-${{ hashFiles('src/**', 'tsconfig*.json') }}

      - name: Build
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: bun run build

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: profile-services:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
