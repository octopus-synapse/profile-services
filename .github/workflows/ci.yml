# =============================================================================
# CI - Pipeline Orquestrador
# =============================================================================
#
# Coordena todos os checks de PR com dependências explícitas.
# Cada etapa é um reusable workflow separado para legibilidade.
#
# Arquitetura:
#   should-skip ──► detect-changes ──► verify-attestation
#                         │
#                         ├──► build (Docker)
#                         │         │
#                         │    ┌────┴────┐
#                         │    ▼         ▼
#                         ├──► integration  e2e
#                         │
#                         └──► unit-tests
#
# =============================================================================

name: CI

on:
    pull_request:
        branches: [main, dev]
        paths-ignore:
            - "CHANGELOG.md"
            - ".release-please-manifest.json"
            - "*.md"
            - "docs/**"
    workflow_dispatch:

concurrency:
    group: ci-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: write
    packages: write

jobs:
    # ═══════════════════════════════════════════════════════════════════════════
    # Gate: Skip duplicates
    # ═══════════════════════════════════════════════════════════════════════════
    should-skip:
        name: Should Skip
        runs-on: ubuntu-latest
        outputs:
            should_skip: ${{ steps.skip.outputs.should_skip }}
        steps:
            - id: skip
              uses: fkirc/skip-duplicate-actions@v5
              with:
                  concurrent_skipping: "same_content_newer"
                  skip_after_successful_duplicate: "true"
                  paths_ignore: '["CHANGELOG.md", ".release-please-manifest.json", "*.md", "docs/**"]'

    # ═══════════════════════════════════════════════════════════════════════════
    # Gate: Detect changes
    # ═══════════════════════════════════════════════════════════════════════════
    detect-changes:
        name: Detect Changes
        needs: [should-skip]
        if: needs.should-skip.outputs.should_skip != 'true'
        runs-on: ubuntu-latest
        outputs:
            src: ${{ steps.filter.outputs.src }}
            tests: ${{ steps.filter.outputs.tests }}
            prisma: ${{ steps.filter.outputs.prisma }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      src:
                        - 'src/**'
                        - 'package.json'
                        - 'bun.lockb'
                        - 'tsconfig*.json'
                      tests:
                        - 'test/**'
                      prisma:
                        - 'prisma/**'

    # ═══════════════════════════════════════════════════════════════════════════
    # Gate: Verify pre-commit attestation
    # ═══════════════════════════════════════════════════════════════════════════
    verify-attestation:
        name: Verify Pre-Commit
        needs: [should-skip]
        if: needs.should-skip.outputs.should_skip != 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
            - name: Verify Attestation
              run: |
                  chmod +x ./scripts/verify-pre-commit-attestation.sh
                  ./scripts/verify-pre-commit-attestation.sh

    # ═══════════════════════════════════════════════════════════════════════════
    # Build: Docker Image
    # ═══════════════════════════════════════════════════════════════════════════
    build:
        name: Build
        needs: [should-skip, detect-changes]
        if: |
            needs.should-skip.outputs.should_skip != 'true' &&
            (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.prisma == 'true')
        uses: ./.github/workflows/ci.build.yml
        with:
            image_tag: pr-${{ github.event.pull_request.number || github.run_number }}-${{ github.sha }}
        secrets: inherit

    # ═══════════════════════════════════════════════════════════════════════════
    # NOTE: Unit tests are NOT run in CI.
    # They already run in pre-commit (verified by attestation).
    # Running them again here would be pure duplication.
    # ═══════════════════════════════════════════════════════════════════════════

    # ═══════════════════════════════════════════════════════════════════════════
    # Test: Integration
    # ═══════════════════════════════════════════════════════════════════════════
    integration:
        name: Integration
        needs: [should-skip, detect-changes, build, verify-attestation]
        if: |
            always() &&
            needs.should-skip.outputs.should_skip != 'true' &&
            (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.prisma == 'true') &&
            (needs.build.result == 'success' || needs.build.result == 'skipped')
        uses: ./.github/workflows/ci.integration.yml
        secrets: inherit

    # ═══════════════════════════════════════════════════════════════════════════
    # Test: E2E
    # ═══════════════════════════════════════════════════════════════════════════
    e2e:
        name: E2E
        needs: [should-skip, detect-changes, build, verify-attestation]
        if: |
            always() &&
            needs.should-skip.outputs.should_skip != 'true' &&
            (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.prisma == 'true') &&
            (needs.build.result == 'success' || needs.build.result == 'skipped')
        uses: ./.github/workflows/ci.e2e.yml
        secrets: inherit

    # ═══════════════════════════════════════════════════════════════════════════
    # Summary
    # ═══════════════════════════════════════════════════════════════════════════
    status:
        name: CI Status
        needs: [verify-attestation, build, integration, e2e]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Check Results
              run: |
                  echo "## 📊 CI Summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
                  echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
                  echo "| Attestation | ${{ needs.verify-attestation.result }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| Integration | ${{ needs.integration.result }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| E2E | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY

                  if [[ "${{ needs.verify-attestation.result }}" == "failure" ]] || \
                     [[ "${{ needs.build.result }}" == "failure" ]] || \
                     [[ "${{ needs.integration.result }}" == "failure" ]] || \
                     [[ "${{ needs.e2e.result }}" == "failure" ]]; then
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "❌ **CI failed**" >> $GITHUB_STEP_SUMMARY
                    exit 1
                  fi

                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "✅ **CI passed**" >> $GITHUB_STEP_SUMMARY

            - name: Comment on PR (Failure)
              if: failure() && github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const results = {
                        attestation: '${{ needs.verify-attestation.result }}',
                        build: '${{ needs.build.result }}',
                        integration: '${{ needs.integration.result }}',
                        e2e: '${{ needs.e2e.result }}'
                      };

                      const failures = Object.entries(results)
                        .filter(([_, status]) => status === 'failure')
                        .map(([name, _]) => `- ❌ ${name}`)
                        .join('\n');

                      const body = [
                        '## ❌ CI Failed',
                        '',
                        'The following checks failed:',
                        failures,
                        '',
                        '> Check the workflow run for details.'
                      ].join('\n');

                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body
                      });
