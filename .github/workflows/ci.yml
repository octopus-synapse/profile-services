name: CI

on:
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - "CHANGELOG.md"
      - "package.json"
      - ".release-please-manifest.json"
      - "*.md"
      - "docs/**"
  # REMOVED: push trigger
  # Why: Causes duplicate runs after merge. Branch protection + PR checks are sufficient.
  # See: docs/E2E_TESTS_AND_CI_OPTIMIZATION.md

permissions:
  contents: write
  packages: read
  pull-requests: write

jobs:
  # Skip CI for release-please PRs (only version bumps, no code changes)
  should-skip:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          concurrent_skipping: "same_content_newer"
          skip_after_successful_duplicate: "true"
          paths_ignore: '["CHANGELOG.md", "package.json", ".release-please-manifest.json", "*.md", "docs/**"]'
          do_not_skip: '["workflow_dispatch", "schedule"]'

  # Detect which parts of codebase changed
  detect-changes:
    needs: should-skip
    if: needs.should-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      e2e: ${{ steps.filter.outputs.e2e }}
      prisma: ${{ steps.filter.outputs.prisma }}
      config: ${{ steps.filter.outputs.config }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
            tests:
              - 'test/**'
            e2e:
              - 'test/e2e/**'
            prisma:
              - 'prisma/**'
            config:
              - 'package.json'
              - 'tsconfig*.json'
              - 'bunfig*.toml'

  # Centralized dependency installation - runs once, cached for all jobs
  # Eliminates duplicate "bun install" across 5+ jobs (saves 2-4 minutes)
  setup:
    name: Setup Dependencies
    needs: should-skip
    if: needs.should-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Cache Dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Configure npm registry
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          echo "@octopus-synapse:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Cache Prisma Client
        id: cache-prisma
        uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ hashFiles('prisma/schema/**/*.prisma') }}
          restore-keys: |
            prisma-

      - name: Generate Prisma Client
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: bunx prisma generate

  # ==========================================================================
  # NOTE: Integration and E2E tests are in separate workflow files
  # - integration.yml → runs on PR with infrastructure (Postgres, Redis)
  # - e2e.yml → runs on PR to main + nightly schedule
  # This follows Single Responsibility Principle (Uncle Bob)
  # ==========================================================================

  hook-compliance:
    name: Verify Pre-Commit Hooks Ran
    needs: [setup, detect-changes, should-skip]
    if: needs.should-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Restore Dependencies
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          fail-on-cache-miss: true

      - name: Restore Prisma Client
        uses: actions/cache/restore@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ hashFiles('prisma/schema/**/*.prisma') }}
          fail-on-cache-miss: true

      - name: Quick lint verification (biome)
        run: bun run lint:fast

      - name: Check if pre-commit hooks were bypassed
        run: |
          echo "🔍 Verificando se pre-commit foi executado..."

          # Generate swagger to check if it's up-to-date
          bun run scripts/generate-swagger-from-decorators.ts

          if ! git diff --quiet swagger.json; then
            echo "❌ swagger.json desatualizado - pre-commit hooks foram ignorados"
            echo "Execute: bun run scripts/generate-swagger-from-decorators.ts"
            exit 1
          fi

          echo "✅ Pre-commit hooks foram executados corretamente"

  lint:
    name: Biome Check (Full)
    needs: [setup, detect-changes, should-skip]
    if: |
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.detect-changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Restore Dependencies
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          fail-on-cache-miss: true

      - name: Restore Prisma Client
        uses: actions/cache/restore@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ hashFiles('prisma/schema/**/*.prisma') }}
          fail-on-cache-miss: true

      - name: Run Biome Check
        run: bun run lint

  build:
    name: Build
    needs: [setup, detect-changes, should-skip]
    if: |
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.detect-changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Restore Dependencies
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          fail-on-cache-miss: true

      - name: Restore Prisma Client
        uses: actions/cache/restore@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ hashFiles('prisma/schema/**/*.prisma') }}
          fail-on-cache-miss: true

      - name: Cache Build Artifacts
        uses: actions/cache@v4
        id: build-cache
        with:
          path: dist
          key: build-${{ hashFiles('src/**', 'tsconfig*.json') }}

      - name: Build
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: bun run build

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: profile-services:${{ github.sha }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
