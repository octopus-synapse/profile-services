name: CI

on:
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - "CHANGELOG.md"
      - ".release-please-manifest.json"
      - "*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Gate: Skip duplicates
  # ═══════════════════════════════════════════════════════════════════════════
  should-skip:
    name: Skip Check
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip.outputs.should_skip }}
    steps:
      - id: skip
        uses: fkirc/skip-duplicate-actions@v5
        with:
          concurrent_skipping: "same_content_newer"
          skip_after_successful_duplicate: "true"
          paths_ignore: '["CHANGELOG.md", ".release-please-manifest.json", "*.md", "docs/**"]'

  # ═══════════════════════════════════════════════════════════════════════════
  # Gate: Detect changes
  # ═══════════════════════════════════════════════════════════════════════════
  detect-changes:
    name: Detect Changes
    needs: [should-skip]
    if: needs.should-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      prisma: ${{ steps.filter.outputs.prisma }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'package.json'
              - 'bun.lockb'
              - 'tsconfig*.json'
            tests:
              - 'test/**'
            prisma:
              - 'prisma/**'

  # ═══════════════════════════════════════════════════════════════════════════
  # Gate: Verify pre-commit attestation
  # ═══════════════════════════════════════════════════════════════════════════
  verify-attestation:
    name: Pre-commit
    needs: [should-skip]
    if: needs.should-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify Attestation
        run: |
          chmod +x ./scripts/attestation.sh
          ./scripts/attestation.sh verify

      - name: Summary
        if: always()
        run: |
          if [ -f .attestation ]; then
            echo "## ✅ Pre-commit Verified" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if command -v jq &> /dev/null; then
              echo "| Check | Passed | Time |" >> $GITHUB_STEP_SUMMARY
              echo "|-------|--------|------|" >> $GITHUB_STEP_SUMMARY
              jq -r '.metrics | to_entries[] | "| \(.key) | \(.value.passed // "—") | \(.value.time_ms // 0)ms |"' .attestation 2>/dev/null >> $GITHUB_STEP_SUMMARY || true
            fi
          else
            echo "## ❌ Pre-commit Missing" >> $GITHUB_STEP_SUMMARY
            echo "Run \`git commit\` without \`--no-verify\`" >> $GITHUB_STEP_SUMMARY
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # Build: Docker smoke test
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build
    needs: [should-skip, detect-changes]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.prisma == 'true')
    uses: ./.github/workflows/ci.build.yml
    with:
      image_tag: pr-${{ github.event.pull_request.number || github.run_number }}-${{ github.sha }}
    secrets: inherit

  # ═══════════════════════════════════════════════════════════════════════════
  # Test: Integration
  # ═══════════════════════════════════════════════════════════════════════════
  integration:
    name: Integration
    needs: [should-skip, detect-changes, verify-attestation]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.verify-attestation.result == 'success' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.prisma == 'true')
    uses: ./.github/workflows/ci.infrastructure.integration.yml
    secrets: inherit

  # ═══════════════════════════════════════════════════════════════════════════
  # Test: E2E
  # ═══════════════════════════════════════════════════════════════════════════
  e2e:
    name: E2E
    needs: [should-skip, detect-changes, verify-attestation]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.verify-attestation.result == 'success' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.prisma == 'true')
    uses: ./.github/workflows/ci.infrastructure.e2e.yml
    secrets: inherit

  # ═══════════════════════════════════════════════════════════════════════════
  # Test: Security
  # ═══════════════════════════════════════════════════════════════════════════
  security:
    name: Security
    needs: [should-skip, detect-changes, verify-attestation]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.verify-attestation.result == 'success' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.tests == 'true')
    uses: ./.github/workflows/ci.static-analysis.security.yml
    secrets: inherit

  # ═══════════════════════════════════════════════════════════════════════════
  # Summary: Final status check
  # ═══════════════════════════════════════════════════════════════════════════
  status:
    name: CI Status
    needs: [verify-attestation, build, integration, e2e, security]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/evaluate-ci-results
        with:
          attestation: ${{ needs.verify-attestation.result }}
          build: ${{ needs.build.result }}
          integration: ${{ needs.integration.result }}
          e2e: ${{ needs.e2e.result }}
          security: ${{ needs.security.result }}
