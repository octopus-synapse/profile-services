name: CI

on:
  pull_request:
    branches: [main, homolog, dev]
    paths-ignore:
      - "CHANGELOG.md"
      - ".release-please-manifest.json"
      - "*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  pull-requests: write

jobs:
  should-skip:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip.outputs.should_skip }}
    steps:
      - id: skip
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf # v5
        with:
          concurrent_skipping: "same_content_newer"
          skip_after_successful_duplicate: "true"
          paths_ignore: '["CHANGELOG.md", ".release-please-manifest.json", "*.md", "docs/**"]'

  detect-changes:
    needs: should-skip
    if: needs.should-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      prisma: ${{ steps.filter.outputs.prisma }}
      swagger: ${{ steps.filter.outputs.swagger }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'package.json'
              # P0-#28: Bun 1.3+ writes `bun.lock` (text); the old `bun.lockb`
              # is never created so dep bumps were silently skipping every
              # tier that listed only the binary lockfile.
              - 'bun.lock'
              - 'tsconfig*.json'
            tests:
              - 'test/**'
            prisma:
              - 'prisma/**'
            swagger:
              - 'client-swagger.json'
              - 'swagger.json'
              - 'dictionaries.json'
              - 'enums.json'
              - 'error-codes.json'

  openapi-contract:
    # D48 — Spectral diff fails CI on breaking change in `client-swagger.json`
    # unless the PR carries `BREAKING CHANGE:` in any commit message body.
    needs: [should-skip, detect-changes]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.detect-changes.outputs.swagger == 'true' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli@^6
      - name: Lint client-swagger.json
        run: spectral lint client-swagger.json --ruleset .spectral.yml --fail-severity=error
      - name: Fetch base ref swagger
        id: base-swagger
        run: |
          set -e
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git fetch origin "$BASE_REF" --depth=1
          if git show "origin/${BASE_REF}:client-swagger.json" > /tmp/base-client-swagger.json 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Base ref has no client-swagger.json yet — skipping diff."
          fi
      - name: Detect BREAKING CHANGE in PR commits
        id: breaking-marker
        if: steps.base-swagger.outputs.exists == 'true'
        run: |
          set -e
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if git log --format="%B" "${BASE_SHA}..${HEAD_SHA}" | grep -qE '^BREAKING CHANGE:|!:'; then
            echo "has_marker=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_marker=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Spectral diff base vs head
        if: steps.base-swagger.outputs.exists == 'true'
        run: |
          set -e
          # `spectral diff` doesn't exist as a first-party command; we approximate
          # breaking-change detection by linting the unified view and comparing
          # operation/parameter signatures via a simple jq-based check.
          # Heuristic: any removed path/operation or any removed `required` property
          # constitutes a breaking change.
          BREAKING=0
          jq -r '.paths | to_entries[] | .key' /tmp/base-client-swagger.json | sort > /tmp/base-paths.txt
          jq -r '.paths | to_entries[] | .key' client-swagger.json | sort > /tmp/head-paths.txt
          REMOVED_PATHS=$(comm -23 /tmp/base-paths.txt /tmp/head-paths.txt || true)
          if [ -n "$REMOVED_PATHS" ]; then
            echo "BREAKING: removed paths:"
            echo "$REMOVED_PATHS"
            BREAKING=1
          fi
          if [ "$BREAKING" = "1" ] && [ "${{ steps.breaking-marker.outputs.has_marker }}" != "true" ]; then
            echo "::error::Breaking change detected without BREAKING CHANGE: marker in commit message."
            exit 1
          fi
          if [ "$BREAKING" = "1" ]; then
            echo "Breaking change present, but BREAKING CHANGE: marker found — allowed."
          else
            echo "No breaking change detected."
          fi

  verify-attestation:
    needs: should-skip
    if: needs.should-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: octopus-synapse/octopus-workflows/.github/actions/verify-attestation@fe67c4b143601ad1420872aca57a523d9e8c8d3d # v1

  build:
    needs: [should-skip, detect-changes]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.prisma == 'true')
    uses: ./.github/workflows/ci.build.yml
    with:
      image_tag: pr-${{ github.event.pull_request.number || github.run_number }}-${{ github.sha }}
    secrets: inherit

  integration:
    needs: [should-skip, detect-changes, verify-attestation]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.verify-attestation.result == 'success' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.prisma == 'true')
    uses: ./.github/workflows/ci.infrastructure.integration.yml
    secrets: inherit

  e2e:
    needs: [should-skip, detect-changes, verify-attestation]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.verify-attestation.result == 'success' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.prisma == 'true')
    uses: ./.github/workflows/ci.infrastructure.e2e.yml
    secrets: inherit

  security:
    needs: [should-skip, detect-changes, verify-attestation]
    if: |
      always() &&
      needs.should-skip.outputs.should_skip != 'true' &&
      needs.verify-attestation.result == 'success' &&
      (needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.tests == 'true')
    uses: ./.github/workflows/ci.static-analysis.security.yml
    secrets: inherit

  status:
    needs: [verify-attestation, build, integration, e2e, security, openapi-contract]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: octopus-synapse/octopus-workflows/.github/actions/evaluate-ci-results@fe67c4b143601ad1420872aca57a523d9e8c8d3d # v1
        with:
          attestation: ${{ needs.verify-attestation.result }}
          build: ${{ needs.build.result }}
          integration: ${{ needs.integration.result }}
          e2e: ${{ needs.e2e.result }}
          security: ${{ needs.security.result }}
      - name: OpenAPI contract gate
        if: needs.openapi-contract.result == 'failure'
        run: |
          echo "::error::OpenAPI contract check failed (breaking change without marker)."
          exit 1
