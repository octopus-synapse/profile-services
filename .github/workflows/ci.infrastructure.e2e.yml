name: _infrastructure-e2e

on:
  workflow_call:
    inputs:
      pr-number:
        description: "PR number for comment updates"
        required: false
        type: string
        default: ""

jobs:
  test:
    uses: ./.github/workflows/_infrastructure-test-template.yml
    with:
      test-command: "bun test --config=bunfig.e2e.toml"
      test-name: "E2E"
      db-name: "e2e_test_db"
      timeout: 20
      pr-number: ${{ inputs.pr-number }}
    secrets: inherit
