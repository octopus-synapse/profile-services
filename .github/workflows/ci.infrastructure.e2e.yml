name: _infrastructure-e2e

# Phase-2 cutover (Nest → Elysia + Bun) replaced AppModule + supertest
# with the framework-free `bootstrap()` + the supertest-shaped fetch
# wrapper under `test/infrastructure/shared/`. Only the migrated
# suites (`test/infrastructure/e2e/*.spec.ts`) run here; the legacy
# tree under `test/infrastructure/_legacy/e2e/` is opt-in via a
# manual run only and gets converted suite-by-suite.

on:
  workflow_call:

jobs:
  test:
    uses: octopus-synapse/octopus-workflows/.github/workflows/_infrastructure-test-template.yml@v1
    with:
      test-command: "bun test --config=bunfig.e2e.toml"
      test-name: "E2E"
      db-name: "e2e_test_db"
      timeout: 20
    secrets: inherit
