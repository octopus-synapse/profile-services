name: _release-create-pr

on:
  workflow_call:
    inputs:
      sha:
        description: 'Commit SHA'
        required: true
        type: string
      forced_type:
        description: 'Forced release type (empty to detect from labels)'
        required: false
        type: string
        default: ''
      repository:
        description: 'Repository in owner/repo format'
        required: true
        type: string
      repository_owner:
        description: 'Repository owner'
        required: true
        type: string
      repository_name:
        description: 'Repository name'
        required: true
        type: string
    outputs:
      release_type:
        description: 'Detected release type'
        value: ${{ jobs.create-pr.outputs.release_type }}
      next_version:
        description: 'Next version'
        value: ${{ jobs.create-pr.outputs.next_version }}

jobs:
  create-pr:
    runs-on: ubuntu-latest
    outputs:
      release_type: ${{ steps.detect.outputs.release_type }}
      next_version: ${{ steps.version.outputs.next }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun-env

      - uses: ./.github/actions/setup-git-bot

      - name: Get PR labels
        id: labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FORCED="${{ inputs.forced_type }}"
          [ -n "$FORCED" ] && { echo "labels=$FORCED" >> $GITHUB_OUTPUT; exit 0; }

          LABELS=$(bun src/release/cli/get-pr-labels.ts \
            --sha="${{ inputs.sha }}" \
            --owner="${{ inputs.repository_owner }}" \
            --repo="${{ inputs.repository_name }}" 2>/dev/null || echo "")
          echo "labels=$LABELS" >> $GITHUB_OUTPUT

      - name: Detect release type
        id: detect
        run: |
          TYPE=$(bun src/release/cli/detect-release.ts --labels="${{ steps.labels.outputs.labels }}")
          echo "release_type=$TYPE" >> $GITHUB_OUTPUT

      - name: Calculate version
        id: version
        if: steps.detect.outputs.release_type != ''
        run: |
          git fetch origin main
          CURRENT=$(git show origin/main:package.json | jq -r '.version')
          NEXT=$(bun src/release/cli/calc-version.ts "$CURRENT" "${{ steps.detect.outputs.release_type }}")
          echo "next=$NEXT" >> $GITHUB_OUTPUT

      - name: Generate changelog
        if: steps.detect.outputs.release_type != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bun src/release/cli/gather-changelog-data.ts \
            --release-type="${{ steps.detect.outputs.release_type }}" \
            --next-version="v${{ steps.version.outputs.next }}" \
            --repository="${{ inputs.repository }}" \
            | bun src/release/cli/gen-changelog.ts > /tmp/changelog.md

          echo -e "\n---\n\n> ⚠️ **Merging this PR will create release v${{ steps.version.outputs.next }}**" >> /tmp/changelog.md

      - name: Create PR
        if: steps.detect.outputs.release_type != ''
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.next }}
        run: |
          jq ".version = \"$VERSION\"" package.json > tmp && mv tmp package.json
          git add package.json && git commit -m "chore(release): v$VERSION" || true
          git push origin homolog

          EXISTING=$(gh pr list --head homolog --base main --json number --jq '.[0].number' || echo "")
          BODY=$(cat /tmp/changelog.md)

          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --title "chore(release): v$VERSION" --body "$BODY"
          else
            gh pr create --head homolog --base main --title "chore(release): v$VERSION" --body "$BODY"
          fi
