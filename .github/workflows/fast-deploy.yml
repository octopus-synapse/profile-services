name: Fast Deploy

# Deploy rápido SEM bump de versão: rebuilda o HEAD atual da branch e sobe pra
# produção. O app continua reportando a versão do package.json (NÃO mexe no
# release-please / não cria tag). A imagem vai pro GHCR como `main-<short-sha>`
# (imutável, alvo válido de rollback.yml) e também atualiza `:latest`.
#
# Build roda em runner do GitHub (push pro GHCR). Deploy roda num runner
# SELF-HOSTED na própria VPS (label profile-vps): o firewall do provedor bloqueia
# SSH de entrada dos runners do GitHub, então o runner local faz polling de saída
# e roda `docker compose` direto no host — sem SSH.
#
# Para mudar a versão de verdade (bump + tag + CHANGELOG), use o fluxo normal:
# release.yml (PR de release patch/minor/major) + cd.yml.
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  packages: write

# Mesmo grupo do cd.yml: nunca roda concorrente com um deploy normal.
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  build:
    name: Build & push (HEAD)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compute image tag (main-<short-sha>)
        id: tag
        run: echo "image_tag=main-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.image_tag }}
            ghcr.io/${{ github.repository }}:latest
          secrets: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/octopus-synapse/profile-services:cache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/octopus-synapse/profile-services:cache,mode=max

      - name: Summary
        run: |
          echo "## 🚀 Fast Deploy — build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Also tagged | \`:latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ref | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: build
    # Runner SELF-HOSTED na VPS (container DooD, label profile-vps). Roda
    # `docker compose` direto no host — sem SSH de entrada (bloqueado pelo
    # firewall do provedor). Mantém o `.env` que já está na VPS (tem PEM
    # multi-linha do witness; não reescrever). As migrations rodam via o
    # entrypoint do container no recreate.
    runs-on: [self-hosted, profile-vps]
    steps:
      - name: Login to ghcr.io
        run: echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull + recreate backend (${{ needs.build.outputs.image_tag }})
        working-directory: /opt/profile-services
        run: |
          docker compose pull backend
          docker compose up -d --force-recreate backend

      - name: Wait for health
        run: |
          for i in $(seq 1 40); do
            s="$(docker inspect profile-backend --format '{{.State.Health.Status}}' 2>/dev/null || echo none)"
            echo "attempt ${i}: health=${s}"
            [ "$s" = "healthy" ] && { echo "✅ backend healthy"; exit 0; }
            sleep 5
          done
          echo "::error::backend não ficou healthy a tempo"
          docker logs profile-backend --tail 80 || true
          exit 1

      - name: Logout ghcr.io
        if: always()
        run: docker logout ghcr.io || true
