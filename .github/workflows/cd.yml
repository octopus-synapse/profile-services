name: CD

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy:
    uses: octopus-synapse/octopus-workflows/.github/workflows/_deploy.yml@v1
    with:
      service-name: "backend"
      container-name: "profile-backend"
      deploy-path: "/opt/profile-services"
      has-database: true
      required-env-vars: "DATABASE_URL,JWT_SECRET,SMTP_PASS,REDIS_HOST,MINIO_ENDPOINT,INTERNAL_API_TOKEN,ATTESTATION_WITNESS_SIGNING_PRIVATE_KEY"
    secrets:
      NODE_AUTH_TOKEN: ${{ secrets.GH_PAT }}
      SERVICE_PORT: ${{ secrets.BACKEND_PORT }}
      OCTOPUS_SSH_PRIVATE_KEY: ${{ secrets.OCTOPUS_SSH_PRIVATE_KEY }}
      OCTOPUS_VM_HOST: ${{ secrets.OCTOPUS_VM_HOST }}
      OCTOPUS_VM_USER: ${{ secrets.OCTOPUS_VM_USER }}
      ENV_VARS: |
        NODE_ENV=production
        BACKEND_PORT=${{ secrets.BACKEND_PORT }}
        POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
        POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
        POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
        DATABASE_URL="postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}?schema=public"
        REDIS_HOST=redis
        REDIS_PORT=6379
        REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
        JWT_SECRET="${{ secrets.JWT_SECRET }}"
        JWT_EXPIRATION=7d
        JWT_ISSUER=patch-careers
        JWT_AUDIENCE=patch-clients
        IP_HASH_SALT="${{ secrets.IP_HASH_SALT }}"
        ENABLE_BULLMQ=true
        SMTP_HOST=smtp.resend.com
        SMTP_PORT=465
        SMTP_SECURE=true
        SMTP_USER=resend
        SMTP_PASS="${{ secrets.RESEND_API_KEY }}"
        EMAIL_FROM=noreply@patchcareers.org
        EMAIL_FROM_NAME="Patch Careers"
        MINIO_ENDPOINT="${{ secrets.MINIO_ENDPOINT }}"
        MINIO_ACCESS_KEY="${{ secrets.MINIO_ACCESS_KEY }}"
        MINIO_SECRET_KEY="${{ secrets.MINIO_SECRET_KEY }}"
        MINIO_BUCKET="${{ secrets.MINIO_BUCKET }}"
        INTERNAL_API_TOKEN="${{ secrets.INTERNAL_API_TOKEN }}"
        ATTESTATION_WITNESS_SIGNING_PRIVATE_KEY="${{ secrets.ATTESTATION_WITNESS_SIGNING_PRIVATE_KEY }}"
        ATTESTATION_WITNESS_KEY_ID="${{ secrets.ATTESTATION_WITNESS_KEY_ID }}"
        CORS_ORIGIN="${{ secrets.CORS_ORIGIN }}"
        PERSISTENT_SESSION_EXPIRY_DAYS="${{ secrets.PERSISTENT_SESSION_EXPIRY_DAYS }}"
        OAUTH_REDIRECT_URI_ALLOWLIST="${{ secrets.OAUTH_REDIRECT_URI_ALLOWLIST }}"
