name: _infrastructure-integration

on:
  workflow_call:
    inputs:
      pr-number:
        description: "PR number for comment updates"
        required: false
        type: string
        default: ""

jobs:
  test:
    uses: ./.github/workflows/_infrastructure-test-template.yml
    with:
      test-command: "bun test --config=bunfig.integration.toml"
      test-name: "Integration"
      db-name: "integration_test_db"
      timeout: 15
      pr-number: ${{ inputs.pr-number }}
    secrets: inherit
