name: Release

on:
  push:
    branches: [homolog, main]
  workflow_dispatch:
    inputs:
      force_release_type:
        description: 'Force release type'
        type: choice
        options: ['', patch, minor, major]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  create-release-pr:
    if: github.ref == 'refs/heads/homolog'
    uses: octopus-synapse/octopus-workflows/.github/workflows/_release-create-pr.yml@v1
    with:
      sha: ${{ github.sha }}
      forced_type: ${{ github.event.inputs.force_release_type || '' }}
      repository: ${{ github.repository }}
      repository_owner: ${{ github.repository_owner }}
      repository_name: ${{ github.event.repository.name }}
    secrets: inherit

  finalize-release:
    # Two entry points:
    #  - push to main where the head commit message contains 'chore(release):'
    #    (covers both squash-merges where the title becomes the commit message
    #     AND merge-commits where the chore line lives in the body).
    #  - manual workflow_dispatch on main (no head_commit payload to inspect),
    #    used to recover from a release PR merged with the wrong strategy.
    # `head_commit.message` is null on workflow_dispatch — `|| ''` keeps
    # `contains()` from blowing up with a null reference in that branch.
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message || '', 'chore(release):'))
    uses: octopus-synapse/octopus-workflows/.github/workflows/_release-finalize.yml@v1
    with:
      commit_sha: ${{ github.sha }}
    secrets: inherit

  build-docker:
    needs: finalize-release
    # Two paths in:
    #  - normal: finalize created a new tag/release (`released == 'true'`)
    #  - recovery: manual workflow_dispatch — run docker build for whatever
    #    version is in package.json, even when the tag already exists. Used
    #    to republish an image after a transient docker build failure
    #    (the original failure mode that bit v0.2.2: GITHUB_TOKEN wasn't
    #    being passed to the build secret in the shared workflow).
    if: needs.finalize-release.outputs.tag != '' && (needs.finalize-release.outputs.released == 'true' || github.event_name == 'workflow_dispatch')
    uses: octopus-synapse/octopus-workflows/.github/workflows/_release-docker.yml@v1
    with:
      tag: ${{ needs.finalize-release.outputs.tag }}
    secrets: inherit

  # release-please reads .release-please-manifest.json from whichever branch
  # it's running on. Our flow is homolog -> main, so the chore(release) commit
  # that bumps the manifest only ever lands on main. Without this sync step
  # the next push to homolog would re-read the OLD manifest and recompute the
  # changelog from the previous baseline, including every PR that's already
  # been released. This job fast-forwards homolog with main's manifest right
  # after the tag exists.
  sync-manifest-to-homolog:
    needs: finalize-release
    if: needs.finalize-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main (the branch that just got the bump)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Open sync PR back to homolog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.finalize-release.outputs.tag }}
        run: |
          set -euo pipefail
          BRANCH="chore/sync-manifest-${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Branch off main so we carry just the manifest + version bumps that
          # already happened on main. Hard-reset would diverge homolog; a PR
          # is the only safe path because of branch protection.
          git checkout -B "$BRANCH"
          git push -u origin "$BRANCH" --force
          gh pr create \
            --base homolog \
            --head "$BRANCH" \
            --title "chore(release): sync manifest to ${TAG}" \
            --body "Automated sync after release ${TAG} so release-please's manifest stays accurate on homolog. Without this the next release PR re-includes already-shipped commits in its changelog." \
            --label patch || true
          # If a PR already exists for this exact tag, let it 404 silently —
          # the previous attempt's PR is still there and humans can merge it.
