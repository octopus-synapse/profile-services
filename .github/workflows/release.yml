name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if this is a release commit (avoid infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find merged PR and check for stable label
        id: pr-info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Looking for merged PR for commit: ${{ github.sha }}"
          
          # Find PR that was merged with this commit
          PR_DATA=$(gh api graphql -f query='
            query($sha: String!, $owner: String!, $repo: String!) {
              repository(owner: $owner, name: $repo) {
                commit: object(expression: $sha) {
                  ... on Commit {
                    associatedPullRequests(first: 1) {
                      nodes {
                        number
                        title
                        labels(first: 10) {
                          nodes {
                            name
                          }
                        }
                        merged
                      }
                    }
                  }
                }
              }
            }
          ' -f sha="${{ github.sha }}" -f owner="${{ github.repository_owner }}" -f repo="${{ github.event.repository.name }}" 2>/dev/null || echo "{}")
          
          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.data.repository.commit.associatedPullRequests.nodes[0].number // empty')
          PR_MERGED=$(echo "$PR_DATA" | jq -r '.data.repository.commit.associatedPullRequests.nodes[0].merged // false')
          HAS_STABLE=$(echo "$PR_DATA" | jq -r '.data.repository.commit.associatedPullRequests.nodes[0].labels.nodes[].name | select(. == "stable")' | head -1)
          
          if [ -n "$PR_NUMBER" ] && [ "$PR_MERGED" == "true" ]; then
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "📋 Found merged PR #$PR_NUMBER"
            
            if [ -n "$HAS_STABLE" ]; then
              echo "is_stable=true" >> $GITHUB_OUTPUT
              echo "🏷️ PR has 'stable' label - will bump MINOR version"
            else
              echo "is_stable=false" >> $GITHUB_OUTPUT
              echo "📦 No 'stable' label - will bump PATCH version"
            fi
          else
            echo "is_stable=false" >> $GITHUB_OUTPUT
            echo "⚠️ No merged PR found (direct push) - will bump PATCH version"
          fi

      - name: Calculate and apply new version
        id: release
        run: |
          # Get current version
          CURRENT=$(jq -r '.version' package.json)
          echo "📌 Current version: $CURRENT"
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          if [ "${{ steps.pr-info.outputs.is_stable }}" == "true" ]; then
            # Stable: bump minor, reset patch
            NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
            echo "🚀 Stable release: $CURRENT → $NEW_VERSION"
          else
            # Normal: bump patch only
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "📦 Patch release: $CURRENT → $NEW_VERSION"
          fi
          
          TAG="v${NEW_VERSION}"
          
          # Update package.json
          jq ".version = \"$NEW_VERSION\"" package.json > package.json.tmp && mv package.json.tmp package.json
          
          # Update release-please manifest (keep it in sync)
          echo "{
            \".\": \"$NEW_VERSION\"
          }" > .release-please-manifest.json
          
          # Commit version bump
          git add package.json .release-please-manifest.json
          git commit -m "chore(release): v${NEW_VERSION}"
          
          # Create annotated tag
          git tag -a "$TAG" -m "Release $TAG"
          
          # Push commit and tag
          git push origin main
          git push origin "$TAG"
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "released=true" >> $GITHUB_OUTPUT
          
          echo "✅ Released $TAG"

      - name: Generate changelog for this release
        id: changelog
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}^" 2>/dev/null || echo "")
          else
            COMPARE_URL="https://github.com/${{ github.repository }}/commits/${TAG}"
            COMMITS="- Initial release"
          fi
          
          # Build changelog
          CHANGELOG="## What's Changed
          
          ${COMMITS}
          
          **Full Changelog**: ${COMPARE_URL}"
          
          # Save to file for later use
          echo "$CHANGELOG" > /tmp/changelog.md
          
          echo "changelog_file=/tmp/changelog.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          CHANGELOG=$(cat /tmp/changelog.md)
          
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "$CHANGELOG" \
            --target main

  build-and-push:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.release.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update release notes with Docker info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          
          # Append Docker info to existing release notes
          CURRENT_NOTES=$(gh release view "$TAG" --json body -q '.body')
          
          DOCKER_INFO="
          
          ---
          
          ## Docker Images
          
          \`\`\`bash
          docker pull ghcr.io/${{ github.repository }}:${TAG}
          docker pull ghcr.io/${{ github.repository }}:latest
          \`\`\`"
          
          gh release edit "$TAG" --notes "${CURRENT_NOTES}${DOCKER_INFO}"
