name: _static-analysis-template

on:
  workflow_call:
    inputs:
      test-command:
        description: "Command to run tests"
        required: true
        type: string
      test-name:
        description: "Test name for summary"
        required: true
        type: string
      timeout:
        description: "Timeout in minutes"
        required: false
        type: number
        default: 10

env:
  NODE_ENV: test

jobs:
  test:
    name: ${{ inputs.test-name }} Tests
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout }}

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        id: tests
        uses: ./.github/actions/run-test-suite
        with:
          test-command: ${{ inputs.test-command }}
          test-name: ${{ inputs.test-name }}
          artifact-name: ${{ inputs.test-name }}-results
          needs-db: 'false'

      - name: Summary
        if: always()
        run: |
          .github/scripts/generate-summary.sh \
            "${{ steps.tests.outputs.status || 'failure' }}" \
            "${{ inputs.test-name }}" \
            "${{ steps.tests.outputs.pass || '0' }}" \
            "${{ steps.tests.outputs.fail || '0' }}" \
            "${{ steps.tests.outputs.skip || '0' }}" \
            "${{ steps.tests.outputs.duration || '0' }}" \
            test-output.txt
