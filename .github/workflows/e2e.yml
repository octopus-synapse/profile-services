# =============================================================================
# E2E Tests Workflow
# =============================================================================
#
# Philosophy (Uncle Bob + Kent Beck):
#   - "E2E tests prove the system works as a whole"
#   - Tests user journeys, not implementation details
#   - Runs against real services (DB, Redis, HTTP)
#
# Triggers:
#   - Pull requests to main (critical path validation)
#   - Nightly schedule (full regression)
#   - Manual dispatch for debugging
#
# =============================================================================

name: E2E Tests

on:
    pull_request:
        branches: [main]
        paths:
            - "src/**"
            - "test/e2e/**"
            - "prisma/**"
    schedule:
        # Nightly full regression at 3 AM UTC
        - cron: "0 3 * * *"
    workflow_dispatch:
        inputs:
            test_filter:
                description: "Filter tests by name pattern (optional)"
                required: false
                default: ""

permissions:
    contents: read
    pull-requests: write
    issues: write

env:
    DATABASE_URL: postgresql://postgres:postgres@localhost:5433/e2e_test_db
    REDIS_HOST: localhost
    REDIS_PORT: 6380
    JWT_SECRET: e2e-test-secret-key-minimum-32-characters-required
    NODE_ENV: test

jobs:
    e2e:
        name: E2E Journey Tests
        runs-on: ubuntu-latest
        timeout-minutes: 20

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: e2e_test_db
                ports:
                    - 5433:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            redis:
                image: redis:7-alpine
                ports:
                    - 6380:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.2.23

            # Restore cached dependencies (shared with ci.yml setup job)
            - name: Restore Dependencies Cache
              id: cache-deps
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      ~/.bun/install/cache
                  key: deps-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
                  restore-keys: deps-${{ runner.os }}-

            - name: Configure npm registry
              if: steps.cache-deps.outputs.cache-hit != 'true'
              run: |
                  echo "@octopus-synapse:registry=https://npm.pkg.github.com" >> .npmrc
                  echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

            - name: Install Dependencies
              if: steps.cache-deps.outputs.cache-hit != 'true'
              run: bun install --frozen-lockfile

            # Restore cached Prisma Client
            - name: Restore Prisma Cache
              id: cache-prisma
              uses: actions/cache/restore@v4
              with:
                  path: node_modules/.prisma
                  key: prisma-${{ hashFiles('prisma/schema/**/*.prisma') }}
                  restore-keys: prisma-

            - name: Generate Prisma Client
              if: steps.cache-prisma.outputs.cache-hit != 'true'
              run: bunx prisma generate

            - name: Setup E2E Database
              run: bun run db:setup:test

            - name: Run E2E Tests
              id: tests
              run: |
                  echo "## 🎭 E2E Test Results" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  TEST_FILTER="${{ github.event.inputs.test_filter }}"
                  if [ -n "$TEST_FILTER" ]; then
                    echo "Running filtered tests: $TEST_FILTER" >> $GITHUB_STEP_SUMMARY
                    TEST_CMD="bun run test:e2e --test-name-pattern \"$TEST_FILTER\""
                  else
                    TEST_CMD="bun run test:e2e"
                  fi

                  if $TEST_CMD 2>&1 | tee test-output.txt; then
                    echo "✅ All E2E tests passed" >> $GITHUB_STEP_SUMMARY
                    echo "status=success" >> $GITHUB_OUTPUT
                  else
                    echo "❌ E2E tests failed" >> $GITHUB_STEP_SUMMARY
                    echo "status=failure" >> $GITHUB_OUTPUT
                    exit 1
                  fi

            - name: Upload Test Results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-test-results-${{ github.run_number }}
                  path: |
                      test-output.txt
                      test-results/
                  retention-days: 14

            - name: Comment PR on Failure
              if: failure() && github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      let output = '';
                      try {
                        output = fs.readFileSync('test-output.txt', 'utf8');
                      } catch (e) {
                        output = 'Could not read test output';
                      }

                      const body = [
                        '## ❌ E2E Tests Failed',
                        '',
                        'User journeys are broken. Please investigate before merging.',
                        '',
                        '<details>',
                        '<summary>Test Output (last 3000 chars)</summary>',
                        '',
                        '```',
                        output.slice(-3000),
                        '```',
                        '</details>',
                        '',
                        '> 💡 Run locally: `docker-compose -f docker-compose.e2e.yml up -d && bun run test:e2e`'
                      ].join('\n');

                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body
                      });

            - name: Create Issue on Nightly Failure
              if: failure() && github.event_name == 'schedule'
              uses: actions/github-script@v7
              with:
                  script: |
                      const title = `🔴 Nightly E2E Failure - ${new Date().toISOString().split('T')[0]}`;

                      // Check for existing open issue
                      const issues = await github.rest.issues.listForRepo({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        state: 'open',
                        labels: 'e2e-failure'
                      });

                      if (issues.data.some(i => i.title.includes('Nightly E2E Failure'))) {
                        console.log('Issue already exists, skipping creation');
                        return;
                      }

                      const body = [
                        '## Nightly E2E Tests Failed',
                        '',
                        `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                        `**Date:** ${new Date().toISOString()}`,
                        '',
                        '### Next Steps',
                        '1. Check the workflow run for details',
                        '2. Reproduce locally with `bun run test:e2e`',
                        '3. Fix the failing tests',
                        '4. Close this issue when resolved',
                      ].join('\n');

                      await github.rest.issues.create({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        title,
                        body,
                        labels: ['e2e-failure', 'priority:high']
                      });
