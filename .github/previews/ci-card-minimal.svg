    <text x="0" y="25" fill="#fafafa" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">2,123</text>
    <text x="75" y="25" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="12">all passing</text>
  </g>

  <g transform="translate(200, 90)">
