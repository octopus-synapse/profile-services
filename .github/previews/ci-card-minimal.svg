    <rect x="0" y="0" width="80" height="44" rx="8" fill="#27272a"/>
    <circle cx="14" cy="22" r="4" fill="#22c55e"/>
    <text x="24" y="18" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="10">E2E</text>
    <text x="24" y="32" fill="#71717a" font-family="Inter, system-ui, sans-serif" font-size="9">1:26</text>

    <rect x="88" y="0" width="80" height="44" rx="8" fill="#27272a"/>
    <circle cx="102" cy="22" r="4" fill="#22c55e"/>
    <text x="112" y="18" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="10">Security</text>
    <text x="112" y="32" fill="#71717a" font-family="Inter, system-ui, sans-serif" font-size="9">22s</text>
  </g>

  <!-- Footer -->
  <text x="24" y="273" fill="#3f3f46" font-family="JetBrains Mono, monospace" font-size="9">attestation: 602e1695 · enzo.patti · 11:15 UTC</text>
