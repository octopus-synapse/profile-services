    <rect x="0" y="0" width="168" height="44" rx="8" fill="#27272a" stroke="#ef4444" stroke-width="1"/>
    <circle cx="16" cy="22" r="5" fill="#ef4444"/>
    <text x="30" y="18" fill="#fafafa" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Integration</text>
    <text x="30" y="32" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="10">1 failed · 2:27</text>
    <text x="150" y="25" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">✗</text>
  </g>

  <g transform="translate(200, 215)">
