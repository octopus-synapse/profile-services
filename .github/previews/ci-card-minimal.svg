    <text x="0" y="0" fill="#71717a" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">DURATION</text>
    <text x="0" y="25" fill="#fafafa" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">4:58</text>
    <text x="55" y="25" fill="#71717a" font-family="Inter, system-ui, sans-serif" font-size="12">total</text>
  </g>

  <g transform="translate(310, 90)">
    <!-- Pass rate -->
    <text x="0" y="0" fill="#71717a" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">PASS RATE</text>
    <text x="0" y="25" fill="#8b5cf6" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">99.9%</text>
  </g>

  <!-- Jobs section -->
  <text x="24" y="155" fill="#71717a" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">PIPELINE</text>

  <!-- Job cards -->
  <g transform="translate(24, 165)">
    <!-- Pre-commit -->
    <rect x="0" y="0" width="168" height="44" rx="8" fill="#27272a"/>
    <circle cx="16" cy="22" r="5" fill="#22c55e"/>
    <text x="30" y="18" fill="#fafafa" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Pre-commit</text>
    <text x="30" y="32" fill="#71717a" font-family="Inter, system-ui, sans-serif" font-size="10">10.3s · 5 checks</text>
    <text x="150" y="25" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">✓</text>
  </g>

  <g transform="translate(200, 165)">
