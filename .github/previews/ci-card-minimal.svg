    <rect x="0" y="0" width="168" height="44" rx="8" fill="#27272a"/>
    <circle cx="16" cy="22" r="5" fill="#22c55e"/>
    <text x="30" y="18" fill="#fafafa" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Build</text>
    <text x="30" y="32" fill="#71717a" font-family="Inter, system-ui, sans-serif" font-size="10">45s · Docker</text>
    <text x="150" y="25" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">✓</text>
  </g>

  <g transform="translate(24, 215)">
