<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="bgMin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b" />
      <stop offset="100%" style="stop-color:#09090b" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#a78bfa" />
    </linearGradient>
    <linearGradient id="success" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e" />
      <stop offset="100%" style="stop-color:#4ade80" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="280" rx="16" fill="url(#bgMin)"/>
  <rect width="400" height="280" rx="16" stroke="#27272a" stroke-width="1" fill="none"/>

  <!-- Accent line top -->
  <rect x="24" y="0" width="60" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Header -->
  <text x="24" y="40" fill="#fafafa" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600">CI Status</text>
  <text x="24" y="58" fill="#52525b" font-family="Inter, system-ui, sans-serif" font-size="12">refactor/consolidate-test-actions</text>

  <!-- Status badge -->
  <rect x="310" y="25" width="70" height="26" rx="13" fill="#422006" stroke="#f59e0b" stroke-width="1"/>
