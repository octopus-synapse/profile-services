<svg xmlns="http://www.w3.org/2000/svg" width="495" height="320" viewBox="0 0 495 320" fill="none">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7" />
      <stop offset="100%" style="stop-color:#6366f1" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24" />
      <stop offset="100%" style="stop-color:#f59e0b" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="495" height="320" rx="10" fill="url(#gradient)"/>
  <rect width="495" height="320" rx="10" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1" fill="none"/>

  <!-- Header -->
  <text x="24" y="35" fill="#a855f7" font-family="Segoe UI, Ubuntu, sans-serif" font-size="18" font-weight="600">CI Pipeline</text>
  <text x="24" y="52" fill="#6b7280" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11">refactor/consolidate-test-actions</text>

  <!-- Grade Circle -->
  <circle cx="430" cy="85" r="45" stroke="#374151" stroke-width="6" fill="none"/>
  <circle cx="430" cy="85" r="45" stroke="url(#ringGrad)" stroke-width="6" fill="none"
          stroke-dasharray="255" stroke-dashoffset="12" stroke-linecap="round" filter="url(#glow)"
          transform="rotate(-90 430 85)"/>
  <text x="430" y="92" fill="#fbbf24" font-family="Segoe UI, Ubuntu, sans-serif" font-size="28" font-weight="700" text-anchor="middle">A</text>
  <text x="430" y="108" fill="#6b7280" font-family="Segoe UI, Ubuntu, sans-serif" font-size="10" text-anchor="middle">95.5%</text>

  <!-- Pre-commit Section -->
  <text x="24" y="85" fill="#9ca3af" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11" font-weight="500">PRE-COMMIT</text>

  <text x="24" y="108" fill="#d1d5db" font-family="Segoe UI, Ubuntu, sans-serif" font-size="13">TypeCheck</text>
  <text x="180" y="108" fill="#22c55e" font-family="Segoe UI, Ubuntu, sans-serif" font-size="12">✓</text>
  <text x="200" y="108" fill="#6b7280" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11">3.3s</text>

  <text x="24" y="128" fill="#d1d5db" font-family="Segoe UI, Ubuntu, sans-serif" font-size="13">Lint</text>
  <text x="180" y="128" fill="#22c55e" font-family="Segoe UI, Ubuntu, sans-serif" font-size="12">✓</text>
  <text x="200" y="128" fill="#6b7280" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11">0.8s</text>

  <text x="24" y="148" fill="#d1d5db" font-family="Segoe UI, Ubuntu, sans-serif" font-size="13">Unit Tests</text>
  <text x="180" y="148" fill="#22c55e" font-family="Segoe UI, Ubuntu, sans-serif" font-size="12">✓</text>
  <text x="200" y="148" fill="#a855f7" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11" font-weight="600">2,036</text>
  <text x="245" y="148" fill="#6b7280" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11">3.7s</text>

  <text x="24" y="168" fill="#d1d5db" font-family="Segoe UI, Ubuntu, sans-serif" font-size="13">Architecture</text>
  <text x="180" y="168" fill="#22c55e" font-family="Segoe UI, Ubuntu, sans-serif" font-size="12">✓</text>
  <text x="200" y="168" fill="#a855f7" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11" font-weight="600">42</text>
  <text x="225" y="168" fill="#6b7280" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11">1.0s</text>

  <text x="24" y="188" fill="#d1d5db" font-family="Segoe UI, Ubuntu, sans-serif" font-size="13">Contracts</text>
  <text x="180" y="188" fill="#22c55e" font-family="Segoe UI, Ubuntu, sans-serif" font-size="12">✓</text>
  <text x="200" y="188" fill="#a855f7" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11" font-weight="600">45</text>
  <text x="225" y="188" fill="#6b7280" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11">0.5s</text>

  <!-- Divider -->
  <line x1="24" y1="205" x2="340" y2="205" stroke="#374151" stroke-width="1"/>

  <!-- CI/CD Section -->
  <text x="24" y="225" fill="#9ca3af" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11" font-weight="500">CI/CD JOBS</text>

  <text x="24" y="248" fill="#d1d5db" font-family="Segoe UI, Ubuntu, sans-serif" font-size="13">Build</text>
  <text x="180" y="248" fill="#22c55e" font-family="Segoe UI, Ubuntu, sans-serif" font-size="12">✓</text>
  <text x="200" y="248" fill="#6b7280" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11">45s</text>

  <text x="24" y="268" fill="#d1d5db" font-family="Segoe UI, Ubuntu, sans-serif" font-size="13">Integration</text>
  <text x="180" y="268" fill="#ef4444" font-family="Segoe UI, Ubuntu, sans-serif" font-size="12">✗</text>
  <text x="200" y="268" fill="#ef4444" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11">1 failed</text>

  <text x="24" y="288" fill="#d1d5db" font-family="Segoe UI, Ubuntu, sans-serif" font-size="13">E2E</text>
  <text x="180" y="288" fill="#22c55e" font-family="Segoe UI, Ubuntu, sans-serif" font-size="12">✓</text>
  <text x="200" y="288" fill="#6b7280" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11">1m 26s</text>

  <text x="24" y="308" fill="#d1d5db" font-family="Segoe UI, Ubuntu, sans-serif" font-size="13">Security</text>
  <text x="180" y="308" fill="#22c55e" font-family="Segoe UI, Ubuntu, sans-serif" font-size="12">✓</text>
  <text x="200" y="308" fill="#6b7280" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11">22s</text>

  <!-- Stats boxes -->
  <rect x="300" y="150" width="80" height="50" rx="6" fill="#1f1f35" stroke="#a855f7" stroke-opacity="0.3"/>
  <text x="340" y="172" fill="#a855f7" font-family="Segoe UI, Ubuntu, sans-serif" font-size="18" font-weight="700" text-anchor="middle">2,123</text>
  <text x="340" y="188" fill="#6b7280" font-family="Segoe UI, Ubuntu, sans-serif" font-size="9" text-anchor="middle">TOTAL TESTS</text>

  <rect x="390" y="150" width="80" height="50" rx="6" fill="#1f1f35" stroke="#22c55e" stroke-opacity="0.3"/>
  <text x="430" y="172" fill="#22c55e" font-family="Segoe UI, Ubuntu, sans-serif" font-size="18" font-weight="700" text-anchor="middle">10.3s</text>
  <text x="430" y="188" fill="#6b7280" font-family="Segoe UI, Ubuntu, sans-serif" font-size="9" text-anchor="middle">PRE-COMMIT</text>

  <rect x="300" y="210" width="170" height="40" rx="6" fill="#1f1f35" stroke="#374151" stroke-opacity="0.5"/>
  <text x="310" y="228" fill="#6b7280" font-family="monospace" font-size="8">ATTESTATION</text>
  <text x="310" y="242" fill="#a855f7" font-family="monospace" font-size="10">602e1695cd91...</text>
</svg>