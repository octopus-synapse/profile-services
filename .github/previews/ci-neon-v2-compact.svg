    <text x="12" y="40" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">Docker image ready</text>

    <!-- Integration -->
    <rect x="150" y="0" width="170" height="50" rx="6" fill="#1e293b" fill-opacity="0.5" stroke="#ef4444" stroke-opacity="0.5"/>
    <circle cx="162" cy="15" r="4" fill="#ef4444"/>
    <text x="172" y="18" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">Integration</text>
    <text x="290" y="18" fill="#ef4444" font-family="JetBrains Mono, monospace" font-size="9">2:27</text>
    <text x="162" y="32" fill="#06b6d4" font-family="JetBrains Mono, monospace" font-size="8" font-weight="600">23 suites · 131 tests</text>
    <text x="162" y="44" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="9">127 pass</text>
    <text x="225" y="44" fill="#ef4444" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600">1 fail</text>
    <text x="265" y="44" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="9">0 err</text>

    <!-- E2E -->
    <rect x="330" y="0" width="160" height="50" rx="6" fill="#1e293b" fill-opacity="0.5"/>
    <circle cx="342" cy="15" r="4" fill="#22c55e"/>
    <text x="352" y="18" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">E2E</text>
    <text x="465" y="18" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="9">1:26</text>
    <text x="342" y="32" fill="#06b6d4" font-family="JetBrains Mono, monospace" font-size="8" font-weight="600">8 suites · 48 tests</text>
    <text x="342" y="44" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="9">48 pass</text>
    <text x="395" y="44" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="9">0 fail · 0 err</text>

    <!-- Security -->
    <rect x="500" y="0" width="150" height="50" rx="6" fill="#1e293b" fill-opacity="0.5"/>
    <circle cx="512" cy="15" r="4" fill="#22c55e"/>
    <text x="522" y="18" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">Security</text>
    <text x="625" y="18" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="9">22s</text>
    <text x="512" y="32" fill="#06b6d4" font-family="JetBrains Mono, monospace" font-size="8" font-weight="600">3 suites · 12 tests</text>
    <text x="512" y="44" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="9">12 pass</text>
    <text x="565" y="44" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="9">0 fail · 0 err</text>
  </g>

  <!-- Footer -->
  <line x1="20" y1="230" x2="700" y2="230" stroke="#1e293b" stroke-width="1"/>
  <text x="20" y="248" fill="#475569" font-family="JetBrains Mono, monospace" font-size="8">ATTESTATION</text>
  <text x="100" y="248" fill="#8b5cf6" font-family="JetBrains Mono, monospace" font-size="8">602e1695cd918a6222602cccd664db57773ffb87</text>
  <text x="550" y="248" fill="#ef4444" font-family="JetBrains Mono, monospace" font-size="8">1 FAILURE: unique constraint on `username`</text>
</svg>
