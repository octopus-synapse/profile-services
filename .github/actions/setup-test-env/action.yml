name: 'Setup Test Environment'
description: 'Common setup and test execution for integration/E2E tests'
inputs:
  test-command:
    description: 'Command to run tests'
    required: true
  test-name:
    description: 'Test name for summary (Integration/E2E)'
    required: true
  artifact-name:
    description: 'Artifact name for results'
    required: false
    default: 'test-results'
outputs:
  status:
    description: 'Test status (success/failure)'
    value: ${{ steps.test.outputs.status }}
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2

    - name: Restore Cache
      id: cache
      uses: actions/cache/restore@v4
      with:
        path: |
          node_modules
          ~/.bun/install/cache
        key: deps-${{ runner.os }}-${{ hashFiles('bun.lockb') }}

    - name: Install
      if: steps.cache.outputs.cache-hit != 'true'
      run: bun install --frozen-lockfile
      shell: bash

    - name: Setup DB
      run: bun run db:setup:test
      shell: bash

    - name: Run Tests
      id: test
      run: |
        echo "## 🧪 ${{ inputs.test-name }} Tests" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if ${{ inputs.test-command }} 2>&1 | tee test-output.txt; then
          echo "✅ All ${{ inputs.test-name }} tests passed" >> $GITHUB_STEP_SUMMARY
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "❌ ${{ inputs.test-name }} tests failed" >> $GITHUB_STEP_SUMMARY
          echo "status=failure" >> $GITHUB_OUTPUT
          exit 1
        fi
      shell: bash

    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}-${{ github.run_number }}
        path: |
          test-output.txt
          test-results/
        retention-days: 7
