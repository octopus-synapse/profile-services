name: 'Setup Bun Environment'
description: 'Setup Bun with aggressive caching'
inputs:
  bun-version:
    description: 'Bun version'
    required: false
    default: '1.3.11'
  with-prisma:
    description: 'Generate Prisma client'
    required: false
    default: 'false'
outputs:
  cache-hit:
    description: 'Whether cache was hit'
    value: ${{ steps.cache-deps.outputs.cache-hit }}
runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache Dependencies
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
        restore-keys: |
          bun-${{ runner.os }}-

    - name: Install Dependencies
      if: steps.cache-deps.outputs.cache-hit != 'true'
      shell: bash
      run: bun install --frozen-lockfile

    - name: Cache Prisma Client
      if: inputs.with-prisma == 'true'
      id: cache-prisma
      uses: actions/cache@v4
      with:
        path: |
          node_modules/.prisma
          node_modules/@prisma/client
        key: prisma-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}
        restore-keys: |
          prisma-${{ runner.os }}-

    - name: Generate Prisma Client
      if: inputs.with-prisma == 'true' && steps.cache-prisma.outputs.cache-hit != 'true'
      shell: bash
      run: bunx prisma generate
