name: 'Setup Infrastructure Test Environment'
description: 'Setup and run tests that require DB/Redis'
inputs:
  test-command:
    description: 'Command to run tests'
    required: true
  test-name:
    description: 'Test name for summary'
    required: true
  artifact-name:
    description: 'Artifact name for results'
    required: false
    default: 'test-results'
outputs:
  status:
    description: 'Test status (success/failure)'
    value: ${{ steps.test.outputs.status }}
  duration:
    description: 'Test duration'
    value: ${{ steps.test.outputs.duration }}
  pass:
    description: 'Number of tests passed'
    value: ${{ steps.test.outputs.pass }}
  fail:
    description: 'Number of tests failed'
    value: ${{ steps.test.outputs.fail }}
  files:
    description: 'Number of test files'
    value: ${{ steps.test.outputs.files }}
runs:
  using: 'composite'
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.11"

    - name: Cache Dependencies
      id: cache
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          ~/.bun/install/cache
        key: deps-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
        restore-keys: |
          deps-${{ runner.os }}-

    - name: Install
      if: steps.cache.outputs.cache-hit != 'true'
      run: bun install --frozen-lockfile
      shell: bash

    - name: Setup DB
      run: bun run db:setup:test
      shell: bash

    - name: Run Tests
      id: test
      run: |
        START=$(date +%s)
        echo "## 🧪 ${{ inputs.test-name }} Tests" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        set +e
        OUTPUT=$(${{ inputs.test-command }} 2>&1 | tee test-output.txt)
        EXIT_CODE=$?
        set -e

        DURATION=$(($(date +%s) - START))
        echo "duration=${DURATION}s" >> $GITHUB_OUTPUT

        # Parse bun test output: " 1121 pass", " 0 fail", "across 42 files"
        PASS=$(echo "$OUTPUT" | grep -oE ' [0-9]+ pass' | grep -oE '[0-9]+' || echo "0")
        FAIL=$(echo "$OUTPUT" | grep -oE ' [0-9]+ fail' | grep -oE '[0-9]+' || echo "0")
        FILES=$(echo "$OUTPUT" | grep -oE 'across [0-9]+ files' | grep -oE '[0-9]+' || echo "?")

        echo "pass=${PASS:-0}" >> $GITHUB_OUTPUT
        echo "fail=${FAIL:-0}" >> $GITHUB_OUTPUT
        echo "files=${FILES:-?}" >> $GITHUB_OUTPUT

        if [[ $EXIT_CODE -eq 0 ]]; then
          echo "✅ ${PASS} tests passed across ${FILES} files" >> $GITHUB_STEP_SUMMARY
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "❌ ${PASS} passed, ${FAIL} failed across ${FILES} files" >> $GITHUB_STEP_SUMMARY
          echo "status=failure" >> $GITHUB_OUTPUT
          exit 1
        fi
      shell: bash

    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}-${{ github.run_number }}
        path: |
          test-output.txt
          test-results/
        retention-days: 7
