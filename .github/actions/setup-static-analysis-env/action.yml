name: 'Setup Static Analysis Environment'
description: 'Setup and run static analysis tests (no DB/Redis)'
inputs:
  test-command:
    description: 'Command to run tests'
    required: true
  test-name:
    description: 'Test name for summary'
    required: true
  artifact-name:
    description: 'Artifact name for results'
    required: false
    default: 'test-results'
outputs:
  status:
    description: 'Test status (success/failure)'
    value: ${{ steps.test.outputs.status }}
  duration:
    description: 'Test duration'
    value: ${{ steps.test.outputs.duration }}
  pass:
    description: 'Number of tests passed'
    value: ${{ steps.test.outputs.pass }}
  fail:
    description: 'Number of tests failed'
    value: ${{ steps.test.outputs.fail }}
  skip:
    description: 'Number of tests skipped'
    value: ${{ steps.test.outputs.skip }}
  files:
    description: 'Number of test files'
    value: ${{ steps.test.outputs.files }}
runs:
  using: 'composite'
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.11"

    - name: Cache Dependencies
      id: cache
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          ~/.bun/install/cache
        key: deps-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
        restore-keys: |
          deps-${{ runner.os }}-

    - name: Install
      if: steps.cache.outputs.cache-hit != 'true'
      run: bun install --frozen-lockfile
      shell: bash

    - name: Run Tests
      id: test
      run: |
        START=$(date +%s)
        echo "## 🧪 ${{ inputs.test-name }} Tests" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Run tests - capture output and CORRECT exit code
        set +e
        ${{ inputs.test-command }} 2>&1 | tee test-output.txt
        EXIT_CODE=${PIPESTATUS[0]}  # FIX: Get test command's exit code, not tee's
        set -e

        DURATION=$(($(date +%s) - START))
        echo "duration=${DURATION}s" >> $GITHUB_OUTPUT

        # Parse bun test output: " 1121 pass", " 0 fail", " 3 skip", "across 42 files"
        PASS=$(grep -oE ' [0-9]+ pass' test-output.txt | grep -oE '[0-9]+' | head -1 || echo "0")
        FAIL=$(grep -oE ' [0-9]+ fail' test-output.txt | grep -oE '[0-9]+' | head -1 || echo "0")
        SKIP=$(grep -oE ' [0-9]+ skip' test-output.txt | grep -oE '[0-9]+' | head -1 || echo "0")
        FILES=$(grep -oE 'across [0-9]+ files' test-output.txt | grep -oE '[0-9]+' | head -1 || echo "?")

        # Ensure values are clean (no newlines, valid format)
        PASS="${PASS//[^0-9]/}"
        FAIL="${FAIL//[^0-9]/}"
        SKIP="${SKIP//[^0-9]/}"
        FILES="${FILES//[^0-9?]/}"

        echo "pass=${PASS:-0}" >> $GITHUB_OUTPUT
        echo "fail=${FAIL:-0}" >> $GITHUB_OUTPUT
        echo "skip=${SKIP:-0}" >> $GITHUB_OUTPUT
        echo "files=${FILES:-?}" >> $GITHUB_OUTPUT

        # CRITICAL: Force failure if ANY tests failed OR exit code non-zero
        if [[ "${FAIL:-0}" != "0" ]] || [[ $EXIT_CODE -ne 0 ]]; then
          echo "❌ ${PASS:-0} passed, **${FAIL:-0} FAILED**, ${SKIP:-0} skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Failed Tests:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -B2 -A10 "✗\|error:\|Expected\|Received" test-output.txt | head -100 >> $GITHUB_STEP_SUMMARY || echo "See test-output.txt artifact for details" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "status=failure" >> $GITHUB_OUTPUT
          echo "::error::${FAIL:-0} tests failed. Build cannot proceed."
          exit 1
        else
          echo "✅ ${PASS:-0} tests passed across ${FILES:-?} files" >> $GITHUB_STEP_SUMMARY
          if [[ "${SKIP:-0}" != "0" ]]; then
            echo "⚠️ Warning: ${SKIP} tests were skipped" >> $GITHUB_STEP_SUMMARY
          fi
          echo "status=success" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}-${{ github.run_number }}
        path: |
          test-output.txt
          test-results/
        retention-days: 7
