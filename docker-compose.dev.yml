services:
  postgres:
    # Local image bundling pgvector + pg_uuidv7. Kept inline in this dev
    # compose so we can omit host ports without relying on YAML custom tags.
    build:
      context: .
      dockerfile: infra/docker/postgres/Dockerfile
    container_name: profile-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-profile_dev}
      PGDATA: /var/lib/postgresql/data/pgdata
    # No host port. Backend reaches Postgres via the internal docker
    # network (`postgres:5432`); developers needing psql/DBeaver from
    # the host run `docker exec -it profile-postgres-dev psql ...`.
    # This frees host port 5432 so a co-installed Postgres / other
    # project never collides with the dev stack.
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - profile-dev-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-profile_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: profile-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis}
    # Same rationale as Postgres above — backend reaches Redis via
    # `redis:6379` on the docker network; host port stays unbound.
    volumes:
      - redis_dev_data:/data
    networks:
      - profile-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    # P1-#A6-7: pin tag — MinIO has had breaking changes between
    # `RELEASE.*` tags. Override via `MINIO_VERSION` for upgrades.
    image: minio/minio:${MINIO_VERSION:-RELEASE.2024-10-13T13-34-11Z}
    container_name: profile-minio-dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    # S3 port (9000) stays on its default — presigned URLs default to
    # `http://localhost:9000/...` when MINIO_PUBLIC_ENDPOINT is the
    # host-facing override, and the browser fetching the resource has
    # to reach it. Console moves to 19001 (project-unique) so it
    # doesn't fight other locally-installed MinIO / web apps on 9001.
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio_dev_data:/data
    networks:
      - profile-dev-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    # P1-#A6-7: pin tag for parity with the prod `minio` image bump.
    image: minio/mc:${MINIO_MC_VERSION:-RELEASE.2024-10-08T09-37-26Z}
    container_name: profile-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/$${MINIO_BUCKET:-profile-uploads} --ignore-existing;
      mc anonymous set download local/$${MINIO_BUCKET:-profile-uploads};
      echo 'Bucket ready';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-profile-uploads}
    networks:
      - profile-dev-network

  mailpit:
    # P1-#A6-7: pin tag. Override via `MAILPIT_VERSION`.
    image: axllent/mailpit:${MAILPIT_VERSION:-v1.20.6}
    container_name: profile-mailpit-dev
    restart: unless-stopped
    # SMTP (1025) stays internal — the backend writes to
    # `mailpit:1025` on the docker network. Only the web UI is
    # published, on a project-unique 18025 so it doesn't fight other
    # mailpit / SMTP UIs on 8025.
    ports:
      - "${MAILPIT_UI_PORT:-18025}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - profile-dev-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8025",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
      secrets:
        - GITHUB_TOKEN
    container_name: profile-backend-dev
    restart: unless-stopped
    command: sh -c "bunx prisma generate && bunx prisma migrate deploy && bun run prisma/seed.ts && bun run start:dev"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-profile_dev}?schema=public
      # Geo lookup source: `postgres` serves the GeoNames import (bun run geo:import);
      # default `bundled` uses the in-memory country-state-city dataset.
      GEO_SOURCE: ${GEO_SOURCE:-bundled}
      # Company autocomplete (logo.dev Brand Search). Unset = search degrades
      # to empty results; set it in the host `.env`.
      LOGO_DEV_SECRET_KEY: ${LOGO_DEV_SECRET_KEY:-}
      # External jobs (JSearch/RapidAPI) daily ingestion cron. Unset =
      # adapter is NotConfigured and the 06:00 cron is not registered;
      # set both in the host `.env` to enable it.
      JSEARCH_RAPIDAPI_KEY: ${JSEARCH_RAPIDAPI_KEY:-}
      JSEARCH_RAPIDAPI_HOST: ${JSEARCH_RAPIDAPI_HOST:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
      # P0-001: ConfigPort schema requires JWT_SECRET >= 32 chars at boot.
      # The fallback below is non-secret for local dev only — production
      # MUST set JWT_SECRET explicitly.
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-minimum-32-characters-long}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      APP_URL: ${APP_URL:-http://localhost:13001}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:13001}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      # Hardcode the mailpit service hostname — the host's `.env` may have
      # `SMTP_HOST=localhost` for the non-docker dev run, and compose's
      # `${VAR:-default}` picks that up, but inside the docker network the
      # only resolvable SMTP host is `mailpit`.
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      EMAIL_FROM: ${EMAIL_FROM:-noreply@profile.local}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-ProFile}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-profile-uploads}
      # The minio SDK performs an HTTP region-discovery call against
      # this endpoint when signing GETs, so it must resolve from inside
      # the backend container. The bridge name `minio:9000` works inside
      # the docker network; override via .env for a host-reachable value
      # when serving the URL to a real browser on the host.
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://minio:9000}
      LOG_LEVEL: debug
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-mec-sync-token-123}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-5}
      SKIP_EMAIL_VERIFICATION: ${SKIP_EMAIL_VERIFICATION:-false}
      BYPASS_2FA: ${BYPASS_2FA:-false}
      # Default ON in dev: lets users created before the consent gate landed
      # keep working without a manual UserConsent backfill. Override to false
      # to exercise the full LGPD flow.
      SKIP_TOS_CHECK: ${SKIP_TOS_CHECK:-true}
    ports:
      # Host 13001 → container 3001 (project-unique host port). The
      # frontend dev server's VITE_API_URL must follow:
      # http://localhost:13001. E2E tests' API_URL constant too.
      - "${BACKEND_PORT:-13001}:3001"
      - "9229:9229"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    networks:
      - profile-dev-network
    volumes:
      - ./src:/app/src:delegated
      - ./packages:/app/packages:delegated
      - ./test:/app/test:delegated
      - ./data:/app/data:delegated
      - ./prisma:/app/prisma:delegated
      - ./prisma.config.ts:/app/prisma.config.ts:delegated
      - ./tsconfig.json:/app/tsconfig.json:delegated
      - ./scripts:/app/scripts:delegated
      - ./bunfig.toml:/app/bunfig.toml:delegated
      # `config/` holds the bunfig.{integration,e2e,static-analysis}.toml
      # variants. Mounted so `bun run test:e2e` (which docker-execs into
      # this container) can pick them up without a docker cp dance.
      - ./config:/app/config:delegated
      - ./package.json:/app/package.json:delegated
      - /app/node_modules
      - ./logs:/app/logs

networks:
  profile-dev-network:
    driver: bridge
    name: profile-dev-network

volumes:
  postgres_dev_data:
    name: profile-postgres-dev-data
    external: true
  redis_dev_data:
    name: profile-redis-dev-data
    external: true
  minio_dev_data:
    name: profile-minio-dev-data

secrets:
  GITHUB_TOKEN:
    environment: GITHUB_TOKEN
