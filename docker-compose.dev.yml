services:
  postgres:
    extends:
      file: infra/docker/compose/postgres.yml
      service: postgres
    container_name: profile-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-profile_dev}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - profile-dev-network

  redis:
    extends:
      file: infra/docker/compose/redis.yml
      service: redis
    container_name: profile-redis-dev
    volumes:
      - redis_dev_data:/data
    networks:
      - profile-dev-network

  minio:
    extends:
      file: infra/docker/compose/minio.yml
      service: minio
    container_name: profile-minio-dev
    volumes:
      - minio_dev_data:/data
    networks:
      - profile-dev-network

  minio-init:
    image: minio/mc
    container_name: profile-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/$${MINIO_BUCKET:-profile-uploads} --ignore-existing;
      mc anonymous set download local/$${MINIO_BUCKET:-profile-uploads};
      echo 'Bucket ready';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-profile-uploads}
    networks:
      - profile-dev-network

  libretranslate:
    extends:
      file: infra/docker/compose/libretranslate.yml
      service: libretranslate
    container_name: profile-libretranslate-dev
    volumes:
      - libretranslate_models:/home/libretranslate/.local
    networks:
      - profile-dev-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: profile-backend-dev
    restart: unless-stopped
    command: sh -c "bunx prisma generate && bunx prisma migrate deploy && bun run prisma/seed.ts && bun run start:dev"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-profile_dev}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-${SENDGRID_EMAIL_FROM}}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-ProFile}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-profile-uploads}
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      LIBRETRANSLATE_URL: http://libretranslate:5000
      LOG_LEVEL: debug
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-mec-sync-token-123}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-5}
      SKIP_EMAIL_VERIFICATION: ${SKIP_EMAIL_VERIFICATION:-false}
      SKIP_TOS_CHECK: ${SKIP_TOS_CHECK:-false}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
      - "9229:9229"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      libretranslate:
        condition: service_healthy
    networks:
      - profile-dev-network
    volumes:
      - ./src:/app/src:delegated
      - ./test:/app/test:delegated
      - ./data:/app/data:delegated
      - ./prisma:/app/prisma:delegated
      - ./prisma.config.ts:/app/prisma.config.ts:delegated
      - ./tsconfig.json:/app/tsconfig.json:delegated
      - ./scripts:/app/scripts:delegated
      - ./tsconfig.build.json:/app/tsconfig.build.json:delegated
      - ./nest-cli.json:/app/nest-cli.json:delegated
      - ./package.json:/app/package.json:delegated
      - /app/node_modules
      - ./logs:/app/logs

networks:
  profile-dev-network:
    driver: bridge
    name: profile-dev-network

volumes:
  postgres_dev_data:
    name: profile-postgres-dev-data
    external: true
  redis_dev_data:
    name: profile-redis-dev-data
    external: true
  minio_dev_data:
    name: profile-minio-dev-data
  libretranslate_models:
    name: profile-libretranslate-models
    external: true
