# PostHog self-hosted — produto analytics. Rodar junto com o compose principal:
#   docker compose -f docker-compose.yml -f infra/docker/docker-compose.posthog.yml up -d
#
# Stack dedicada (Postgres + Redis + ClickHouse + PostHog web/worker) pra não
# contaminar o Postgres/Redis do backend. PostHog assume controle total dos
# próprios bancos e tem patterns de escrita muito pesados (ClickHouse insert
# bursts) que não queremos misturados com o banco transacional do app.
#
# Exponha a UI só via caddy/nginx com auth externo — nunca publicamente direto.

services:
  posthog-postgres:
    image: postgres:16-alpine
    container_name: posthog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: posthog
      POSTGRES_PASSWORD: ${POSTHOG_DB_PASSWORD:-posthog}
      POSTGRES_DB: posthog
    volumes:
      - posthog_postgres_data:/var/lib/postgresql/data
    networks:
      - profile-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U posthog']
      interval: 10s
      timeout: 5s
      retries: 5

  posthog-redis:
    image: redis:7-alpine
    container_name: posthog-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - posthog_redis_data:/data
    networks:
      - profile-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  posthog-clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: posthog-clickhouse
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - posthog_clickhouse_data:/var/lib/clickhouse
    networks:
      - profile-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'localhost:8123/ping']
      interval: 10s
      timeout: 5s
      retries: 10

  posthog:
    image: posthog/posthog:latest
    container_name: posthog
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://posthog:${POSTHOG_DB_PASSWORD:-posthog}@posthog-postgres:5432/posthog
      REDIS_URL: redis://posthog-redis:6379/
      CLICKHOUSE_HOST: posthog-clickhouse
      CLICKHOUSE_DATABASE: posthog
      CLICKHOUSE_SECURE: 'false'
      CLICKHOUSE_VERIFY: 'false'
      SECRET_KEY: ${POSTHOG_SECRET_KEY}
      SITE_URL: ${POSTHOG_SITE_URL:-http://localhost:8000}
      DISABLE_SECURE_SSL_REDIRECT: 'true'
      IS_BEHIND_PROXY: 'true'
      TRUST_ALL_PROXIES: 'true'
    depends_on:
      posthog-postgres:
        condition: service_healthy
      posthog-redis:
        condition: service_healthy
      posthog-clickhouse:
        condition: service_healthy
    networks:
      - profile-network
    expose:
      - '8000'

networks:
  profile-network:
    external: true
    name: profile-network

volumes:
  posthog_postgres_data:
    name: posthog-postgres-data
  posthog_redis_data:
    name: posthog-redis-data
  posthog_clickhouse_data:
    name: posthog-clickhouse-data
