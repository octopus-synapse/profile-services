# Docker Compose for Integration Tests
# Uses separate ports to avoid conflicts with development environment
#
# Usage: bun run test:integration:docker

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: profile-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: profile_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d profile_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data # Use tmpfs for faster tests

  redis-test:
    image: redis:7-alpine
    container_name: profile-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-setup-test:
    image: oven/bun:1.3.11
    container_name: profile-db-setup-test
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/profile_test
      REDIS_HOST: redis-test
      REDIS_PORT: 6379
      JWT_SECRET: test-secret-key-for-integration-tests-min-32-chars
      NODE_ENV: test
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    command: >
      sh -lc "
        bun install --frozen-lockfile &&
        bun run db:setup:test
      "
    restart: "no"
