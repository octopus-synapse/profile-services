services:
  postgres:
    extends:
      file: postgres.yml
      service: postgres
    restart: "no"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: profile_test
    ports:
      - "5433:5432"
    healthcheck:
      interval: 5s
    tmpfs:
      - /var/lib/postgresql/data
