services:
  postgres:
    extends:
      file: postgres.yml
      service: postgres
    restart: "no"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: profile_test
    # Test-only Postgres tunings — durability is irrelevant because
    # the data dir lives in tmpfs (lost on container restart anyway),
    # and dropping fsync / synchronous_commit / full_page_writes
    # turns most INSERT/UPDATE batches into pure RAM ops. Roughly
    # halves write latency for the seed + freshUser fixtures.
    command:
      - postgres
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off
      - -c
      - wal_level=minimal
      - -c
      - max_wal_senders=0
      - -c
      - max_connections=200
    ports: !override
      - "5433:5432"
    healthcheck:
      interval: 5s
    tmpfs:
      - /var/lib/postgresql/data
