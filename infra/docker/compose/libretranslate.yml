services:
  libretranslate:
    # P1-#A6-7: pin tag — `:latest` lets upstream breaking changes (new
    # CLI flags, removed languages, port shifts) land silently between
    # deploys. Override via `LIBRETRANSLATE_VERSION` if a newer build is
    # explicitly green in CI.
    image: libretranslate/libretranslate:${LIBRETRANSLATE_VERSION:-v1.7.4}
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: "pt,en"
      LT_UPDATE_MODELS: "true"
    ports:
      - "${LIBRETRANSLATE_PORT:-5000}:5000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:5000/languages'')" || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 4G
