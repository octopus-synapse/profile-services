services:
  minio:
    # P1-#A6-7: pin tag — MinIO has had breaking changes between
    # `RELEASE.*` tags. Override via `MINIO_VERSION` for upgrades.
    image: minio/minio:${MINIO_VERSION:-RELEASE.2024-10-13T13-34-11Z}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
