services:
  postgres:
    # Local image bundling pgvector + pg_uuidv7. Built from
    # `infra/docker/postgres/Dockerfile`. pgvector underpins the
    # `Job.embeddingVector` column; pg_uuidv7 is required by the
    # `20260503120000_install_pg_uuidv7` migration. Production uses a
    # managed Postgres where both extensions are enabled via the
    # provider's allowlist (see `scripts/check-pg-extensions.ts`).
    build:
      context: ../../..
      dockerfile: infra/docker/postgres/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-profile}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-profile}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
