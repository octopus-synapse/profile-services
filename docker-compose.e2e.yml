# Usage:
#   Backend E2E: bun run test:e2e:docker
#   Frontend E2E: (from profile-frontend) bun run e2e:test

services:
  postgres:
    extends:
      file: infra/docker/compose/postgres-test.yml
      service: postgres
    container_name: profile-postgres-e2e

  redis:
    extends:
      file: infra/docker/compose/redis-test.yml
      service: redis
    container_name: profile-redis-e2e

  profile-services:
    image: ${PROFILE_SERVICES_IMAGE:-ghcr.io/ilelo/profile-services:latest}
    pull_policy: ${PULL_POLICY:-always}
    container_name: profile-services-e2e
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: test
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/profile_test
      REDIS_URL: redis://redis:6379
      JWT_SECRET: e2e_test_secret_key_minimum_32_characters_long
      JWT_EXPIRES_IN: 1h
      ENABLE_EMAIL: "false"
      ENABLE_ANALYTICS: "false"
      RATE_LIMIT_MAX: "1000"
      RATE_LIMIT_AUTH_MAX: "1000"
      SKIP_EMAIL_VERIFICATION: "true"
      SKIP_TOS_CHECK: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      sh -c "
        sleep 5 &&
        bunx prisma generate &&
        bunx prisma db push --force-reset --accept-data-loss &&
        bun run prisma/seed.ts &&
        bun run dist/src/main.js
      "

networks:
  default:
    name: profile-e2e-network
